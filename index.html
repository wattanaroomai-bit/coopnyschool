<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสหกรณ์โรงเรียน</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- นำเข้า React และ ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- นำเข้า Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- นำเข้า HTML5 QR Code Scanner -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* สไตล์เฉพาะสำหรับการพิมพ์ A4 */
        @media print {
            .print-hidden { display: none !important; }
            .print-only { display: block !important; }
            @page { 
                size: A4 portrait; 
                margin: 15mm 15mm 20mm 15mm; 
            }
            body { background-color: white; margin: 0; padding: 0; font-size: 12pt; color: black; }
            
            /* เทคนิคบังคับ Header/Footer ให้แสดงทุกหน้า */
            table.report-container { width: 100%; }
            thead.report-header { display: table-header-group; }
            tfoot.report-footer { display: table-footer-group; }
            
            /* ป้องกันการตัดหน้ากระดาษกลางบรรทัด */
            tr, .avoid-break { page-break-inside: avoid; }
            
            .print-table { width: 100%; border-collapse: collapse; }
            .print-table th, .print-table td { border: 1px solid #94a3b8; padding: 6px; }
            .print-no-border th, .print-no-border td { border: none !important; padding: 2px; }
            
            /* ซ่อนเงาและสีพื้นหลังที่ไม่จำเป็นตอนพิมพ์ */
            .shadow-sm, .shadow-md, .shadow-lg, .shadow-2xl { box-shadow: none !important; }
            .bg-gray-50, .bg-blue-50, .bg-green-50, .bg-purple-50, .bg-red-50, .bg-orange-50 { background-color: white !important; border: 1px solid #ccc !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==============================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbycN-KzUymkFAryompd3_FH8LAUY978FAKWbyk6ogP0ieSheSbRNjnhTg142tbJkdobqQ/exec";
        // ==============================================================

        // --- Icon Mapper ---
        const Icon = ({ name, size = 24, className = '', ...props }) => (
            <i className={`ph ph-${name} ${className}`} style={{ fontSize: size }} {...props}></i>
        );
        const Home = (p) => <Icon name="house" {...p} />;
        const ShoppingCart = (p) => <Icon name="shopping-cart" {...p} />;
        const Package = (p) => <Icon name="package" {...p} />;
        const Users = (p) => <Icon name="users" {...p} />;
        const BarChart2 = (p) => <Icon name="chart-bar" {...p} />;
        const Scan = (p) => <Icon name="scan" {...p} />;
        const Plus = (p) => <Icon name="plus" {...p} />;
        const Trash2 = (p) => <Icon name="trash" {...p} />;
        const Edit = (p) => <Icon name="pencil-simple" {...p} />;
        const Printer = (p) => <Icon name="printer" {...p} />;
        const AlertCircle = (p) => <Icon name="warning-circle" {...p} />;
        const CheckCircle = (p) => <Icon name="check-circle" {...p} />;
        const X = (p) => <Icon name="x" {...p} />;
        const Lock = (p) => <Icon name="lock" {...p} />;
        const Settings = (p) => <Icon name="gear" {...p} />;
        const LogIn = (p) => <Icon name="sign-in" {...p} />;
        const LogOut = (p) => <Icon name="sign-out" {...p} />;
        const UserPlus = (p) => <Icon name="user-plus" {...p} />;
        const Shield = (p) => <Icon name="shield-check" {...p} />;
        const Menu = (p) => <Icon name="list" {...p} />;
        const Delete = (p) => <Icon name="backspace" {...p} />;
        const History = (p) => <Icon name="clock-counter-clockwise" {...p} />;
        const Camera = (p) => <Icon name="camera" {...p} />;
        const Search = (p) => <Icon name="magnifying-glass" {...p} />;
        const UserCircle = (p) => <Icon name="user-circle" {...p} />;
        const ExternalLink = (p) => <Icon name="arrow-square-out" {...p} />;
        const ArrowLeft = (p) => <Icon name="arrow-left" {...p} />;
        const Wallet = (p) => <Icon name="wallet" {...p} />;
        const Receipt = (p) => <Icon name="receipt" {...p} />;
        const UploadCloud = (p) => <Icon name="cloud-arrow-up" {...p} />;
        const FileImage = (p) => <Icon name="image" {...p} />;
        const Loader2 = (p) => <Icon name="spinner" className={`animate-spin ${p.className||''}`} {...p} />;
        const ArrowsClockwise = (p) => <Icon name="arrows-clockwise" {...p} />;
        const CheckSquare = (p) => <Icon name="check-square" {...p} />;
        const Square = (p) => <Icon name="square" {...p} />;
        const Calendar = (p) => <Icon name="calendar-blank" {...p} />;
        const Coin = (p) => <Icon name="coins" {...p} />;

        const getGradeWeight = (grade) => {
            const weights = { 'อนุบาล 2': 1, 'อนุบาล 3': 2, 'ป.1': 3, 'ป.2': 4, 'ป.3': 5, 'ป.4': 6, 'ป.5': 7, 'ป.6': 8, 'ครู': 99 };
            return weights[String(grade)] || 100;
        };

        // --- Helper สำหรับแปลงวันที่ไทยเป็น Date Object ---
        const parseThaiDate = (dateString) => {
            if (!dateString) return new Date();
            try {
                // รูปแบบ "25/12/2566 14:30:00"
                const parts = dateString.split(' ');
                const dateParts = parts[0].split('/');
                const timeParts = parts[1] ? parts[1].split(':') : ['00', '00', '00'];
                const day = parseInt(dateParts[0], 10);
                const month = parseInt(dateParts[1], 10) - 1;
                let year = parseInt(dateParts[2], 10);
                if (year > 2400) year -= 543; // แปลง พ.ศ. เป็น ค.ศ.
                return new Date(year, month, day, timeParts[0], timeParts[1], timeParts[2]);
            } catch (e) {
                return new Date(dateString); // Fallback
            }
        };

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("ระบบตรวจพบข้อผิดพลาด:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-screen flex flex-col items-center justify-center bg-gray-50 p-6 text-center print-hidden">
                            <div className="bg-red-50 text-red-600 p-8 rounded-2xl border border-red-200 shadow-sm max-w-lg">
                                <AlertCircle size={64} className="mx-auto mb-4 opacity-50" />
                                <h2 className="text-2xl font-bold mb-2">อ๊ะ! เกิดข้อผิดพลาดบางอย่าง</h2>
                                <p className="mb-4 text-sm text-red-500 bg-white p-3 rounded border border-red-100 overflow-auto max-h-32">{this.state.error && this.state.error.toString()}</p>
                                <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-red-700 transition shadow-md">รีเฟรชหน้าจอ</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- MAIN APP COMPONENT ---
        function CoopApp() {
            const [isInitializing, setIsInitializing] = useState(true);
            const [appMode, setAppMode] = useState('main'); 
            const [isSidebarOpen, setIsSidebarOpen] = useState(false); 

            // Global State 
            const [users, setUsers] = useState([]);
            const [products, setProducts] = useState([]);
            const [members, setMembers] = useState([]);
            const [sales, setSales] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [settings, setSettings] = useState({ dividendRate: 5, refundRate: 2, sharePrice: 10, coopName: "สหกรณ์โรงเรียน", coopLogo: "" });
            const [logs, setLogs] = useState([]);

            // Auth State
            const [currentUser, setCurrentUser] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');

            // UI State
            const [activeTab, setActiveTab] = useState('pos');
            const [posCashier, setPosCashier] = useState(null); 
            const [posLoginId, setPosLoginId] = useState('');
            const [cart, setCart] = useState([]);
            const [barcodeInput, setBarcodeInput] = useState('');
            const [checkoutModal, setCheckoutModal] = useState(false);
            const [cashGiven, setCashGiven] = useState('');
            const [receiptModal, setReceiptModal] = useState(false);
            const [lastReceipt, setLastReceipt] = useState(null);
            const [posMemberId, setPosMemberId] = useState(''); 
            const [memberModalTarget, setMemberModalTarget] = useState(null); 
            const [memberSearch, setMemberSearch] = useState('');

            useEffect(() => {
                fetchDataFromCloud();
            }, []);

            const fetchDataFromCloud = async () => {
                setIsInitializing(true);
                try {
                    const response = await fetch(GAS_URL);
                    const result = await response.json();
                    if (result.status === "success") {
                        setUsers(result.data.users || []);
                        setProducts(result.data.products || []);
                        setMembers(result.data.members || []);
                        setSales(result.data.sales || []);
                        setExpenses(result.data.expenses || []);
                        setLogs(result.data.logs || []);
                        setSettings(result.data.settings || { dividendRate: 5, refundRate: 2, sharePrice: 10, coopName: "สหกรณ์โรงเรียน", coopLogo: "" });
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                } finally {
                    setIsInitializing(false);
                }
            };

            const syncToCloud = async (action, payload) => {
                try {
                    fetch(GAS_URL, {
                        method: "POST",
                        mode: "no-cors", 
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({ action, payload })
                    }).catch((e) => console.error("Sync Error Background:", e));
                } catch (e) { console.error("Sync Error:", e); }
            };

            const addLog = (action, details) => {
                const userName = currentUser ? currentUser.name : (posCashier ? posCashier.name : 'System');
                const newLog = { id: Date.now(), date: new Date().toLocaleString('th-TH'), user: String(userName), action: action, details: details };
                const updatedLogs = [newLog, ...logs];
                setLogs(updatedLogs);
                syncToCloud("ADD_LOG", newLog); 
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const user = users.find(u => String(u.username) === String(loginForm.username) && String(u.password) === String(loginForm.password));
                if (user) {
                    setCurrentUser(user);
                    setShowLoginModal(false);
                    setLoginForm({ username: '', password: '' });
                    setLoginError('');
                    setActiveTab('dashboard');
                    setIsSidebarOpen(true);
                    addLog('เข้าสู่ระบบจัดการ', `ล็อกอินบัญชี: ${user.username}`);
                } else {
                    setLoginError('ชื่อผู้ใช้ หรือ รหัสผ่านไม่ถูกต้อง');
                }
            };

            const handleLogout = () => {
                addLog('ออกจากระบบจัดการ', 'ออกจากระบบ');
                setCurrentUser(null);
                setActiveTab('pos');
                setIsSidebarOpen(false);
            };

            const handlePosLoginSubmit = (e) => { e.preventDefault(); handlePosLogin(posLoginId); };
            const handlePosLogin = (id) => {
                const member = members.find(m => String(m.id) === String(id));
                if (member) {
                    setPosCashier(member);
                    setPosLoginId('');
                    addLog('เข้าสู่ระบบ POS', `เข้ากะโดย: ${member.name}`);
                } else { alert('ไม่พบรหัสสมาชิกนี้ในระบบ'); }
            };
            const handlePosLogout = () => { addLog('ออกจากระบบ POS', `ปิดกะโดย: ${posCashier.name}`); setPosCashier(null); };

            const handleBarcodeSubmit = (e) => {
                e.preventDefault();
                if (!barcodeInput) return;
                const product = products.find(p => String(p.barcode) === String(barcodeInput));
                if (product) addToCart(product);
                else alert('ไม่พบสินค้านี้ในระบบ');
                setBarcodeInput('');
            };

            const addToCart = (product) => {
                setCart(prevCart => {
                    const existing = prevCart.find(item => item.id === product.id);
                    if (existing) return prevCart.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
                    return [...prevCart, { ...product, qty: 1 }];
                });
            };

            const cartTotal = cart.reduce((sum, item) => sum + (Number(item.price) * Number(item.qty)), 0);

            const processCheckout = () => {
                const cash = parseFloat(cashGiven);
                if (isNaN(cash) || cash < cartTotal) return alert('รับเงินมาไม่เพียงพอ!');

                const change = cash - cartTotal;
                const sellerName = currentUser ? currentUser.name : (posCashier ? posCashier.name : 'ระบบ');
                const newSale = {
                    id: 'INV' + Date.now().toString().slice(-6),
                    date: new Date().toLocaleString('th-TH'),
                    items: [...cart], total: cartTotal, cash: cash, change: change, seller: sellerName, memberId: posMemberId
                };

                const updatedProducts = products.map(p => {
                    const cartItem = cart.find(c => c.id === p.id);
                    return cartItem ? { ...p, stock: Number(p.stock) - Number(cartItem.qty) } : p;
                });

                let memberName = 'ลูกค้าทั่วไป';
                let updatedMembers = [...members];
                if (posMemberId) {
                    const member = members.find(m => String(m.id) === String(posMemberId));
                    if (member) {
                        memberName = member.name;
                        updatedMembers = members.map(m => String(m.id) === String(posMemberId) ? { ...m, totalSpent: Number(m.totalSpent || 0) + cartTotal } : m);
                        setMembers(updatedMembers);
                    }
                }

                setProducts(updatedProducts);
                setSales([...sales, newSale]);
                setLastReceipt(newSale);
                setCheckoutModal(false);
                setReceiptModal(true);
                
                syncToCloud("ADD_SALE", newSale);
                syncToCloud("SYNC_PRODUCTS", updatedProducts);
                if (posMemberId) syncToCloud("SYNC_MEMBERS", updatedMembers);

                addLog('ทำรายการขาย', `บิล ${newSale.id} ยอด ฿${cartTotal} (ผู้ซื้อ: ${memberName})`);
                setCart([]); setCashGiven(''); setPosMemberId('');
            };

            if (isInitializing) {
                return (
                <div className="h-screen flex flex-col items-center justify-center bg-gray-50 relative print-hidden">
                    <Loader2 className="animate-spin text-green-600 mb-4" size={48} />
                    <h2 className="text-xl font-bold text-gray-800">กำลังเชื่อมต่อฐานข้อมูล...</h2>
                    <div className="absolute bottom-4 text-xs text-gray-400 font-medium">พัฒนาระบบ โดย ครูวัฒนา รู้ใหม่</div>
                </div>
                );
            }

            if (appMode === 'member_portal') {
                return <MemberPortalView members={members} settings={settings} onExit={() => setAppMode('main')} onRefresh={fetchDataFromCloud} isRefreshing={isInitializing} />;
            }

            const renderTabContent = () => {
                if (activeTab !== 'pos' && !currentUser) {
                    return (
                        <div className="h-full flex flex-col items-center justify-center text-gray-500">
                            <Shield size={64} className="text-gray-300 mb-4" />
                            <h2 className="text-2xl font-bold mb-2">จำกัดสิทธิ์การเข้าถึง</h2>
                            <p className="mb-4">กรุณาลงชื่อเข้าใช้ (แอดมิน/ผู้จัดการ) เพื่อจัดการระบบหลังบ้าน</p>
                            <button onClick={() => setShowLoginModal(true)} className="bg-green-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-green-700 transition">เข้าสู่ระบบจัดการ</button>
                        </div>
                    );
                }

                switch (activeTab) {
                    case 'dashboard': return <Dashboard products={products} members={members} sales={sales} expenses={expenses} settings={settings} setActiveTab={setActiveTab}/>;
                    case 'pos': 
                        if (!currentUser && !posCashier) {
                            return (
                                <div className="flex flex-col items-center justify-center h-full pb-20 relative">
                                    <div className="absolute top-4 right-4">
                                        <button onClick={() => setAppMode('member_portal')} className="bg-purple-100 text-purple-700 hover:bg-purple-200 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 transition shadow-sm border border-purple-200">
                                        <Wallet size={16} /> สำหรับสมาชิก: ตรวจสอบยอด
                                        </button>
                                    </div>
                                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-96 max-w-full text-center relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
                                        <div className="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-sm overflow-hidden">
                                            {settings.coopLogo ? <img src={settings.coopLogo} className="w-full h-full object-cover" alt="Logo"/> : <UserCircle size={48} />}
                                        </div>
                                        <h2 className="text-2xl font-bold text-gray-800 mb-1">{settings.coopName || "จุดขายสินค้า (POS)"}</h2>
                                        <p className="text-gray-500 text-sm mb-6">กรุณากรอก <span className="font-bold text-blue-600">รหัสสมาชิก</span> เพื่อเข้ากะทำงาน</p>
                                        <form onSubmit={handlePosLoginSubmit} className="space-y-4">
                                            <input type="text" value={posLoginId} onChange={(e) => setPosLoginId(e.target.value)} placeholder="รหัสสมาชิก นร. / ครู" className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-center text-lg font-bold tracking-wider" autoFocus />
                                            <button type="submit" disabled={!posLoginId} className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-sm disabled:bg-gray-300">เข้าสู่ระบบจุดขาย</button>
                                        </form>
                                        <div className="mt-6 pt-4 border-t border-gray-100">
                                            <button onClick={() => setMemberModalTarget('login')} className="text-blue-600 text-sm font-medium hover:underline flex items-center justify-center gap-1 mx-auto bg-blue-50 px-4 py-2 rounded-lg transition hover:bg-blue-100"><Search size={16}/> ค้นหารายชื่อสมาชิก (ลืมรหัส)</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        }
                        return <POS products={products} cart={cart} setCart={setCart} barcodeInput={barcodeInput} setBarcodeInput={setBarcodeInput} handleBarcodeSubmit={handleBarcodeSubmit} setCheckoutModal={setCheckoutModal} cashier={currentUser || posCashier} posMemberId={posMemberId} setPosMemberId={setPosMemberId} members={members} onOpenSearch={() => setMemberModalTarget('buyer')} settings={settings} />;
                    
                    case 'inventory': return <Inventory products={products} setProducts={(data) => { setProducts(data); syncToCloud("SYNC_PRODUCTS", data); }} addLog={addLog} />;
                    case 'members': return <Members members={members} setMembers={(data) => { setMembers(data); syncToCloud("SYNC_MEMBERS", data); }} settings={settings} addLog={addLog} />;
                    case 'expenses': return (currentUser?.role === 'admin' || currentUser?.role === 'manager') ? <ExpenseManagement expenses={expenses} setExpenses={(data, newExp) => { setExpenses(data); if(newExp) syncToCloud("ADD_EXPENSE", newExp); }} sales={sales} members={members} settings={settings} addLog={addLog} currentUser={currentUser} /> : <div>ไม่มีสิทธิ์เข้าถึง</div>;
                    case 'reports': return <Reports sales={sales} products={products} members={members} settings={settings} expenses={expenses} />;
                    case 'settings': return (currentUser?.role === 'admin' || currentUser?.role === 'manager') ? <SettingsTab settings={settings} setSettings={setSettings} onSave={(newSettings) => syncToCloud("UPDATE_SETTINGS", newSettings || settings)} logs={logs} addLog={addLog} /> : <div>ไม่มีสิทธิ์เข้าถึง</div>;
                    case 'users-manage': return currentUser?.role === 'admin' ? <UserManagement users={users} setUsers={(data) => { setUsers(data); syncToCloud("SYNC_USERS", data); }} addLog={addLog}/> : <div>ไม่มีสิทธิ์เข้าถึง</div>;
                    default: return <POS products={products} cart={cart} setCart={setCart} barcodeInput={barcodeInput} setBarcodeInput={setBarcodeInput} handleBarcodeSubmit={handleBarcodeSubmit} setCheckoutModal={setCheckoutModal} cashier={currentUser || posCashier} posMemberId={posMemberId} setPosMemberId={setPosMemberId} members={members} onOpenSearch={() => setMemberModalTarget('buyer')} settings={settings} />;
                }
            };

            return (
                <>
                <div className="flex h-screen bg-gray-50 font-sans overflow-hidden print-hidden">
                    {/* Sidebar */}
                    <div className={`bg-green-700 text-white flex flex-col shadow-lg z-20 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className={`p-4 bg-green-800 flex items-center transition-all ${isSidebarOpen ? 'gap-3' : 'justify-center'}`}>
                            <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-green-700 font-bold text-xl shrink-0 shadow-sm overflow-hidden">
                                {settings.coopLogo ? <img src={settings.coopLogo} className="w-full h-full object-cover" alt="Logo"/> : "สห."}
                            </div>
                            {isSidebarOpen && (
                                <div className="overflow-hidden whitespace-nowrap animate-in fade-in duration-300 flex-1">
                                <h1 className="font-bold text-base leading-tight truncate">{settings.coopName || "สหกรณ์โรงเรียน"}</h1>

                    html5QrCode = new window.Html5Qrcode("reader");
                    try {
                        await html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 10, qrbox: { width: 250, height: 250 } },
                            (decodedText) => { 
                                if (html5QrCode.isScanning) { 
                                    html5QrCode.stop().then(() => onScan(decodedText)).catch(console.error); 
                                } else { 
                                    onScan(decodedText); 
                                } 
                            },
                            (err) => {} 
                        );

        function Inventory({ products, setProducts, addLog }) {
            const [modalMode, setModalMode] = useState(null); 
            const [currentProduct, setCurrentProduct] = useState(null);
            const [showCameraScanner, setShowCameraScanner] = useState(false);
            
            const generateBarcode = () => Math.floor(10000000 + Math.random() * 90000000).toString();

            const handleOpenAdd = () => { setCurrentProduct({ id: Date.now(), barcode: '', name: '', category: 'เครื่องเขียน', price: '', cost: '', stock: '', image: 'https://placehold.co/100x100?text=New', minStock: 10 }); setModalMode('add'); };
            const handleOpenEdit = (product) => { setCurrentProduct({...product}); setModalMode('edit'); };

            const handleProductImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 300; 
                            let width = img.width;
                            let height = img.height;
                            
                            if (width > height) {
                                if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                            } else {
                                if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                            setCurrentProduct({...currentProduct, image: compressedDataUrl});
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSaveProduct = (e) => {
                e.preventDefault();
                let newProducts;
                if (modalMode === 'add') {
                newProducts = [...products, currentProduct];
                addLog('เพิ่มสินค้าใหม่', `รหัส ${currentProduct.barcode} - ${currentProduct.name} จำนวน ${currentProduct.stock} ชิ้น`);

                newProducts = products.map(p => String(p.id) === String(currentProduct.id) ? currentProduct : p);

                setProducts(newProducts);
                setModalMode(null);
            };

            const handleDelete = (id, name) => {

                }
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
