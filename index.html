<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสหกรณ์โรงเรียน</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- เปลี่ยนมาใช้ CDN ที่เสถียรที่สุด (Cloudflare) ป้องกันปัญหาเน็ตโรงเรียนบล็อก -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* สไตล์สำหรับการพิมพ์ A4 */
        @media print {
            body * { visibility: hidden; }
            #printable-report, #printable-report * { visibility: visible; }
            #printable-report {
                position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; box-shadow: none !important;
            }
            @page { size: A4 portrait; margin: 15mm; }
            .print-table { width: 100%; border-collapse: collapse; }
            .print-table th, .print-table td { border: 1px solid #e5e7eb; padding: 8px; }
            .print-no-border th, .print-no-border td { border: none !important; padding: 0; }
            tr { page-break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    
    <!-- หน้าจอแสดงผลเวลาโหลด หรือถ้าก๊อปโค้ดผิดจะแสดงอันนี้แทนจอขาว -->
    <div id="fallback-loading" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f8fafc;">
        <div style="width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <h2 style="margin-top: 20px; font-weight: bold; color: #1e293b; font-family: sans-serif;">กำลังเตรียมระบบสหกรณ์...</h2>
        <p style="color: #64748b; font-family: sans-serif; margin-top: 5px;">หากค้างหน้านี้นานเกิน 5 วินาที แสดงว่าอาจมีการคัดลอกโค้ดไม่ครบถ้วน</p>
        <div id="error-box" style="display: none; margin-top: 20px; padding: 15px; background-color: #fee2e2; color: #b91c1c; border-radius: 8px; max-width: 80%; word-break: break-all; text-align: left; border: 1px solid #f87171;"></div>
    </div>

    <!-- จุดที่ React จะทำงาน -->
    <div id="root"></div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- สคริปต์ตรวจจับ Error ป้องกันจอขาว -->
    <script>
        window.addEventListener('error', function(e) {
            document.getElementById('fallback-loading').style.display = 'flex';
            document.getElementById('root').style.display = 'none';
            var errorBox = document.getElementById('error-box');
            errorBox.style.display = 'block';
            errorBox.innerHTML = '<b>ตรวจพบข้อผิดพลาดในโค้ด:</b><br/>' + e.message + '<br/>บรรทัดที่: ' + e.lineno;
        });
    </script>

    <!-- โค้ดระบบสหกรณ์ (React JSX) -->
    <script type="text/babel">
        // ปิดหน้าจอโหลดเมื่อเริ่มรันโค้ด
        document.getElementById('fallback-loading').style.display = 'none';
        
        const { useState, useEffect, useMemo } = React;

        // ==============================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbycN-KzUymkFAryompd3_FH8LAUY978FAKWbyk6ogP0ieSheSbRNjnhTg142tbJkdobqQ/exec";
        // ==============================================================

        // --- Icon Mapper ---
        const Icon = ({ name, size = 24, className = '', ...props }) => (
            <i className={`ph ph-${name} ${className}`} style={{ fontSize: size }} {...props}></i>
        );
        const ShoppingCart = (p) => <Icon name="shopping-cart" {...p} />;
        const Package = (p) => <Icon name="package" {...p} />;
        const Users = (p) => <Icon name="users" {...p} />;
        const BarChart2 = (p) => <Icon name="chart-bar" {...p} />;
        const Scan = (p) => <Icon name="scan" {...p} />;
        const Plus = (p) => <Icon name="plus" {...p} />;
        const Trash2 = (p) => <Icon name="trash" {...p} />;
        const Edit = (p) => <Icon name="pencil-simple" {...p} />;
        const Printer = (p) => <Icon name="printer" {...p} />;
        const AlertCircle = (p) => <Icon name="warning-circle" {...p} />;
        const CheckCircle = (p) => <Icon name="check-circle" {...p} />;
        const X = (p) => <Icon name="x" {...p} />;
        const Lock = (p) => <Icon name="lock" {...p} />;
        const Settings = (p) => <Icon name="gear" {...p} />;
        const LogIn = (p) => <Icon name="sign-in" {...p} />;
        const LogOut = (p) => <Icon name="sign-out" {...p} />;
        const UserPlus = (p) => <Icon name="user-plus" {...p} />;
        const Shield = (p) => <Icon name="shield-check" {...p} />;
        const Menu = (p) => <Icon name="list" {...p} />;
        const Delete = (p) => <Icon name="backspace" {...p} />;
        const History = (p) => <Icon name="clock-counter-clockwise" {...p} />;
        const Camera = (p) => <Icon name="camera" {...p} />;
        const Search = (p) => <Icon name="magnifying-glass" {...p} />;
        const UserCircle = (p) => <Icon name="user-circle" {...p} />;
        const ExternalLink = (p) => <Icon name="arrow-square-out" {...p} />;
        const ArrowLeft = (p) => <Icon name="arrow-left" {...p} />;
        const Wallet = (p) => <Icon name="wallet" {...p} />;
        const Receipt = (p) => <Icon name="receipt" {...p} />;
        const UploadCloud = (p) => <Icon name="cloud-arrow-up" {...p} />;
        const FileImage = (p) => <Icon name="image" {...p} />;
        const Loader2 = (p) => <Icon name="spinner" className={`animate-spin ${p.className||''}`} {...p} />;
        const ArrowsClockwise = (p) => <Icon name="arrows-clockwise" {...p} />;
        const CheckSquare = (p) => <Icon name="check-square" {...p} />;
        const Square = (p) => <Icon name="square" {...p} />;
        const Money = (p) => <Icon name="money" {...p} />;
        const Calendar = (p) => <Icon name="calendar-blank" {...p} />;
        const Gift = (p) => <Icon name="gift" {...p} />;

        // --- Utils ---
        const getGradeWeight = (grade) => {
            const weights = { 'อนุบาล 2': 1, 'อนุบาล 3': 2, 'ป.1': 3, 'ป.2': 4, 'ป.3': 5, 'ป.4': 6, 'ป.5': 7, 'ป.6': 8, 'ครู': 99 };
            return weights[String(grade)] || 100;
        };

        const parseThaiDate = (dateString) => {
            if (!dateString) return new Date(0);
            try {
                const [datePart] = String(dateString).split(' ');
                if (!datePart) return new Date(0);
                const [d, m, y] = datePart.split('/');
                if (!d || !m || !y) return new Date(0);
                const gregorianYear = parseInt(y) > 2500 ? parseInt(y) - 543 : parseInt(y);
                return new Date(gregorianYear, parseInt(m) - 1, parseInt(d));
            } catch (e) {
                return new Date(0);
            }
        };

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("React Error:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-screen flex flex-col items-center justify-center bg-gray-50 p-6 text-center print-hidden">
                            <div className="bg-red-50 text-red-600 p-8 rounded-2xl border border-red-200 shadow-sm max-w-lg">
                                <AlertCircle size={64} className="mx-auto mb-4 opacity-50" />
                                <h2 className="text-2xl font-bold mb-2">ระบบจัดการขัดข้องชั่วคราว</h2>
                                <p className="mb-4 text-sm text-red-500 bg-white p-3 rounded border border-red-100 overflow-auto max-h-32 text-left">
                                    {this.state.error && this.state.error.toString()}
                                </p>
                                <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-red-700 shadow-md">
                                    รีเฟรชหน้าจอเพื่อเริ่มใหม่
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- Reusable UI Components ---
        function NavItem({ icon, label, active, onClick, isOpen }) {
            return (
                <button onClick={onClick} title={!isOpen ? label : ''} className={`flex items-center gap-3 py-2.5 rounded-lg transition overflow-hidden ${isOpen ? 'px-4 w-full' : 'justify-center w-12 mx-auto'} ${active ? 'bg-white text-green-700 shadow-md font-bold' : 'text-green-100 hover:bg-green-600/50 hover:text-white font-medium'}`}>
                    <div className="shrink-0">{icon}</div>
                    {isOpen && <span className="whitespace-nowrap animate-in fade-in duration-300">{label}</span>}
                </button>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className={`p-4 sm:p-5 rounded-xl border ${color} flex items-center gap-4 shadow-sm`}>
                    <div className="p-3 bg-white rounded-lg shadow-sm shrink-0">{icon}</div>
                    <div><p className="text-sm text-gray-600">{title}</p><p className="text-xl sm:text-2xl font-bold text-gray-800 truncate">{value}</p></div>
                </div>
            );
        }

        function BarcodeScannerModal({ isOpen, onClose, onScan, title }) {
            const [camError, setCamError] = useState('');
            useEffect(() => {
                let html5QrCode;
                if (isOpen) {
                    setCamError('');
                    const initScanner = async () => {
                        if (!document.getElementById('reader')) return;
                        html5QrCode = new window.Html5Qrcode("reader");
                        try {
                            await html5QrCode.start(
                                { facingMode: "environment" },
                                { fps: 10, qrbox: { width: 250, height: 250 } },
                                (decodedText) => { 
                                    if (html5QrCode.isScanning) { 
                                        html5QrCode.stop().then(() => onScan(decodedText)).catch(console.error); 
                                    } else { onScan(decodedText); } 
                                },
                                (err) => {} 
                            );
                        } catch (err) {
                            setCamError("ไม่สามารถเข้าถึงกล้องได้ (โปรดตรวจสอบสิทธิ์การใช้กล้อง)");
                        }
                    };
                    if (!window.Html5Qrcode) {
                        const script = document.createElement('script'); script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js'; script.async = true; script.onload = initScanner; document.body.appendChild(script);
                    } else { initScanner(); }
                }
                return () => { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(console.error); };
            }, [isOpen, onScan]);

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
                    <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden relative shadow-2xl flex flex-col">
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50 shrink-0">
                            <h3 className="font-bold text-gray-800 flex items-center gap-2"><Scan className="text-blue-600" /> {title || "สแกนบาร์โค้ด"}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-red-500 bg-gray-200 hover:bg-red-50 p-1 rounded-full"><X size={20}/></button>
                        </div>
                        <div className="p-6 flex flex-col items-center bg-gray-900">
                            {camError ? (
                                <div className="w-full aspect-square bg-gray-800 rounded-xl flex flex-col items-center justify-center text-red-400 p-4 text-center border-2 border-dashed border-gray-700"><AlertCircle size={48} className="mb-2 opacity-50" /><p>{camError}</p></div>
                            ) : (
                                <div className="relative w-full aspect-square bg-black rounded-xl overflow-hidden flex items-center justify-center"><div id="reader" className="w-full"></div><div className="absolute inset-0 pointer-events-none flex items-center justify-center z-10"><div className="w-48 h-48 border-2 border-green-500 relative shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]"><div className="absolute top-1/2 left-0 w-full h-0.5 bg-red-500/80 shadow-[0_0_10px_red] animate-pulse"></div></div></div></div>
                            )}
                            <p className="mt-6 text-sm text-gray-300 font-medium">หันกล้องไปที่บาร์โค้ด</p>
                            <div className="mt-6 w-full pt-4 border-t border-gray-700">
                                <p className="text-xs text-gray-400 text-center mb-2">ปุ่มจำลองการแสกน</p>
                                <div className="flex gap-2">
                                    <button onClick={() => onScan('885000111')} className="flex-1 bg-gray-800 text-blue-400 border border-gray-700 font-medium py-2 rounded-lg text-sm">สมุด</button>
                                    <button onClick={() => onScan('885000333')} className="flex-1 bg-gray-800 text-green-400 border border-gray-700 font-medium py-2 rounded-lg text-sm">นม</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Major Tab Components ---
        function Dashboard({ products, members, sales, expenses, settings, setActiveTab }) {
            const arrProducts = Array.isArray(products) ? products : [];
            const arrMembers = Array.isArray(members) ? members : [];
            const arrSales = Array.isArray(sales) ? sales : [];
            const arrExpenses = Array.isArray(expenses) ? expenses : [];

            const lowStockProducts = arrProducts.filter(p => Number(p.stock) <= Number(p.minStock||0));
            const totalSalesToday = arrSales.reduce((sum, sale) => sum + Number(sale.total||0), 0);
            
            const totalShareCapital = arrMembers.reduce((sum, m) => sum + Number(m.shares||0), 0) * Number(settings.sharePrice||0);
            const totalSalesCash = arrSales.reduce((sum, s) => sum + Number(s.total||0), 0);
            const totalExpensesCash = arrExpenses.reduce((sum, e) => sum + Number(e.amount||0), 0);
            const currentDrawerCash = totalShareCapital + totalSalesCash - totalExpensesCash;

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard title="ยอดขายวันนี้" value={`฿${totalSalesToday.toLocaleString()}`} icon={<BarChart2 className="text-blue-500" />} color="bg-blue-50 border-blue-100" />
                        <StatCard title="เงินสดคงเหลือระบบ" value={`฿${currentDrawerCash.toLocaleString()}`} icon={<Wallet className="text-green-500" />} color="bg-green-50 border-green-100" />
                        <StatCard title="สินค้าในระบบ" value={`${arrProducts.length} รายการ`} icon={<Package className="text-purple-500" />} color="bg-purple-50 border-purple-100" />
                        <StatCard title="สมาชิกทั้งหมด" value={`${arrMembers.length} คน`} icon={<Users className="text-orange-500" />} color="bg-orange-50 border-orange-100" />
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><AlertCircle className="text-red-500" /> สินค้าใกล้หมดสต็อก</h3>
                            {lowStockProducts.length > 0 ? (
                                <div className="space-y-3">
                                    {lowStockProducts.map(p => (
                                        <div key={p.id} className="flex justify-between items-center p-3 bg-red-50 rounded-lg border border-red-100">
                                            <div className="flex items-center gap-3"><img src={p.image || 'https://placehold.co/100x100?text=No+Image'} className="w-10 h-10 rounded object-cover" /><div><p className="font-medium text-gray-800">{p.name}</p><p className="text-xs text-gray-500">บาร์โค้ด: {p.barcode}</p></div></div>
                                            <div className="text-right"><p className="text-red-600 font-bold">เหลือ {p.stock} ชิ้น</p><button onClick={() => setActiveTab('inventory')} className="text-xs text-blue-600 hover:underline">จัดการสต็อก</button></div>
                                        </div>
                                    ))}
                                </div>
                            ) : <div className="text-center text-gray-500 py-6">ไม่มีสินค้าใกล้หมดสต็อก 🎉</div>}
                        </div>
                        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">เมนูลัด (Quick Actions)</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => setActiveTab('pos')} className="p-4 bg-gradient-to-br from-green-500 to-green-600 rounded-xl text-white shadow hover:shadow-lg transition flex flex-col items-center justify-center gap-2"><ShoppingCart size={32} /><span className="font-bold text-sm">เปิดจุดขาย</span></button>
                                <button onClick={() => setActiveTab('inventory')} className="p-4 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl text-white shadow hover:shadow-lg transition flex flex-col items-center justify-center gap-2"><Plus size={32} /><span className="font-bold text-sm">เพิ่มสินค้า</span></button>
                                <button onClick={() => setActiveTab('members')} className="p-4 bg-gradient-to-br from-orange-400 to-orange-500 rounded-xl text-white shadow hover:shadow-lg transition flex flex-col items-center justify-center gap-2"><Users size={32} /><span className="font-bold text-sm">รับสมัครสมาชิก</span></button>
                                <button onClick={() => setActiveTab('reports')} className="p-4 bg-gradient-to-br from-purple-500 to-purple-600 rounded-xl text-white shadow hover:shadow-lg transition flex flex-col items-center justify-center gap-2"><BarChart2 size={32} /><span className="font-bold text-sm">ดูยอดขาย</span></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function POS({ products, cart, setCart, barcodeInput, setBarcodeInput, handleBarcodeSubmit, setCheckoutModal, cashier, posMemberId, setPosMemberId, members, onOpenSearch, settings }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [showCameraScanner, setShowCameraScanner] = useState(false);

            const filteredProducts = (Array.isArray(products) ? products : []).filter(p => String(p.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || String(p.barcode || '').includes(searchTerm));
            const cartTotal = (Array.isArray(cart) ? cart : []).reduce((sum, item) => sum + (Number(item.price) * Number(item.qty)), 0);

            const updateQty = (id, newQty) => {
                if (newQty < 1) return setCart((Array.isArray(cart) ? cart : []).filter(item => item.id !== id));
                setCart((Array.isArray(cart) ? cart : []).map(item => item.id === id ? { ...item, qty: newQty } : item));
            };

            const handleCameraScan = (barcode) => {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine'; osc.frequency.value = 800; gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } catch(e){}
                const product = (Array.isArray(products) ? products : []).find(p => String(p.barcode) === String(barcode));
                if (product) { setCart(prev => prev.find(i => i.id === product.id) ? prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i) : [...prev, { ...product, qty: 1 }]); } else alert(`ไม่พบสินค้าบาร์โค้ด: ${barcode}`);
                setShowCameraScanner(false);
            };

            return (
                <div className="flex flex-col lg:flex-row h-full gap-4 lg:gap-6 pb-4">
                    <div className="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden min-h-[400px]">
                        <div className="p-4 border-b bg-gray-50 flex flex-col sm:flex-row gap-4 items-center justify-between">
                            <form onSubmit={handleBarcodeSubmit} className="w-full sm:flex-1 min-w-[200px] flex gap-2">
                                <div className="relative flex-1">
                                    <Scan className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" size={20} />
                                    <input type="text" value={barcodeInput} onChange={(e) => setBarcodeInput(e.target.value)} placeholder="สแกน/พิมพ์บาร์โค้ด..." className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" autoFocus/>
                                </div>
                                <button type="button" onClick={() => setShowCameraScanner(true)} className="bg-blue-600 text-white px-3 py-2 rounded-lg hover:bg-blue-700 transition flex items-center justify-center gap-1 shadow-sm"><Camera size={20} /> <span className="hidden sm:inline font-medium">กล้อง</span></button>
                                <button type="submit" className="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition font-medium">ค้นหา</button>
                            </form>
                            <div className="w-full sm:w-auto flex items-center gap-2">
                                <div className="w-px h-8 bg-gray-300 hidden md:block"></div>
                                <input type="text" placeholder="🔍 ค้นหาสินค้าด้วยชื่อ..." className="w-full md:w-64 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                        </div>
                        <div className="flex-1 p-4 overflow-y-auto bg-gray-100/50">
                            <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
                                {filteredProducts.map(product => (

                                        <div className="text-[10px] sm:text-xs text-gray-500 mb-1">{product.category}</div>

                    <div className="lg:w-80 w-full bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden shrink-0 h-[50vh] lg:h-full">
                        <div className="p-4 bg-green-700 text-white font-bold flex justify-between items-center">

                        </div>
                        <div className="p-3 bg-blue-50 border-b border-blue-100 flex gap-2 items-center flex-wrap">
                            <Users size={18} className="text-blue-600 shrink-0"/>
                            <input type="text" placeholder="รหัส นร./ครู (ถ้ามี)" value={posMemberId} onChange={(e) => setPosMemberId(e.target.value)} className="flex-1 px-3 py-1.5 rounded border border-blue-200 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 min-w-[120px]" />

                            {posMemberId && (Array.isArray(members) ? members : []).find(m=>String(m.id) === String(posMemberId)) && (<div className="w-full flex items-center gap-1 text-sm text-green-700 font-bold mt-1 bg-green-100 px-2 py-1 rounded"><CheckCircle size={16} className="text-green-500" />{(Array.isArray(members) ? members : []).find(m=>String(m.id) === String(posMemberId)).name}</div>)}
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 bg-gray-50/50">

                                <div className="space-y-2">

        function Inventory({ products, setProducts, addLog }) {
            const [modalMode, setModalMode] = useState(null); 
            const [currentProduct, setCurrentProduct] = useState(null);
            const [showCameraScanner, setShowCameraScanner] = useState(false);
            
            const generateBarcode = () => Math.floor(10000000 + Math.random() * 90000000).toString();

            const handleOpenAdd = () => { setCurrentProduct({ id: Date.now(), barcode: '', name: '', category: 'เครื่องเขียน', price: '', cost: '', stock: '', image: 'https://placehold.co/100x100?text=New', minStock: 10 }); setModalMode('add'); };
            const handleOpenEdit = (product) => { setCurrentProduct({...product}); setModalMode('edit'); };

            const handleProductImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 300; 
                            let width = img.width; let height = img.height;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                            setCurrentProduct({...currentProduct, image: compressedDataUrl});
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSaveProduct = (e) => {
                e.preventDefault();
                let newProducts;
                if (modalMode === 'add') {
                    newProducts = [...(Array.isArray(products) ? products : []), currentProduct];
                    addLog('เพิ่มสินค้าใหม่', `รหัส ${currentProduct.barcode} - ${currentProduct.name} จำนวน ${currentProduct.stock} ชิ้น`);
                } else {
                    newProducts = (Array.isArray(products) ? products : []).map(p => String(p.id) === String(currentProduct.id) ? currentProduct : p);
                    addLog('แก้ไขสินค้า', `อัปเดตข้อมูล ${currentProduct.name}`);
                }
                setProducts(newProducts);
                setModalMode(null);
            };

            const handleDelete = (id, name) => {
                if(window.confirm(`ต้องการลบสินค้า ${name} ใช่หรือไม่?`)) {
                    setProducts((Array.isArray(products) ? products : []).filter(p => String(p.id) !== String(id)));
                    addLog('ลบสินค้า', `ลบสินค้า ${name} ออกจากคลัง`);
                }
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">

                        <button onClick={handleOpenAdd} className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2 text-sm font-medium"><Plus size={16} /> เพิ่มสินค้าใหม่</button>
                    </div>

                    <div className="overflow-x-auto rounded-lg border border-gray-200">
                        <table className="w-full text-left border-collapse min-w-[900px]">
                            <thead>
                                <tr className="bg-gray-50 border-b border-gray-200 text-sm text-gray-600">
                                    <th className="p-3 font-medium w-48">ภาพ & บาร์โค้ด</th>
                                    <th className="p-3 font-medium">ชื่อสินค้า</th>
                                    <th className="p-3 font-medium text-right">ต้นทุน</th>
                                    <th className="p-3 font-medium text-right">ราคาขาย</th>
                                    <th className="p-3 font-medium text-right text-green-600">กำไร/ชิ้น</th>
                                    <th className="p-3 font-medium text-center">สต็อกเหลือ</th>
                                    <th className="p-3 font-medium text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100 text-sm">
                                {(Array.isArray(products) ? products : []).map(p => (
                                    <tr key={p.id} className="hover:bg-gray-50 transition">
                                        <td className="p-3">
                                            <div className="bg-white border rounded p-1 inline-block"><img src={`https://barcode.tec-it.com/barcode.ashx?data=${p.barcode}&code=Code128&translate-esc=true&dpi=96`} alt="barcode" className="h-10 w-auto" /></div>
                                            <div className="text-xs text-gray-400 mt-1">{p.barcode}</div>
                                        </td>
                                        <td className="p-3 font-medium text-gray-800"><div className="flex items-center gap-2"><img src={p.image || 'https://placehold.co/100x100?text=No+Image'} className="w-8 h-8 rounded border object-cover"/> {p.name}</div></td>
                                        <td className="p-3 text-right text-gray-500">฿{p.cost}</td>
                                        <td className="p-3 text-right font-bold text-gray-800">฿{p.price}</td>
                                        <td className="p-3 text-right font-bold text-green-600">฿{Number(p.price) - Number(p.cost)}</td>
                                        <td className="p-3 text-center"><span className={`font-bold px-2 py-1 rounded ${Number(p.stock) <= Number(p.minStock || 0) ? 'bg-red-100 text-red-600' : 'text-gray-700'}`}>{p.stock}</span></td>
                                        <td className="p-3 text-center">
                                            <div className="flex items-center justify-center gap-2">
                                                <button onClick={() => handleOpenEdit(p)} className="text-blue-500 hover:bg-blue-100 p-1.5 rounded transition"><Edit size={16} /></button>
                                                <button onClick={() => handleDelete(p.id, p.name)} className="text-red-500 hover:bg-red-100 p-1.5 rounded transition"><Trash2 size={16} /></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {modalMode && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl p-6 w-[500px] max-w-[90%] max-h-[90vh] overflow-y-auto">
                                <h3 className="text-lg font-bold mb-4 border-b pb-2">{modalMode === 'add' ? 'เพิ่มสินค้าใหม่' : 'แก้ไขข้อมูลสินค้า'}</h3>
                                <form onSubmit={handleSaveProduct} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 mb-1">รหัสบาร์โค้ด</label>
                                        <div className="flex gap-2">
                                            <input type="text" value={currentProduct.barcode} onChange={e=>setCurrentProduct({...currentProduct, barcode: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none bg-gray-50" required />
                                            <button type="button" onClick={()=>setShowCameraScanner(true)} className="bg-blue-100 text-blue-700 px-3 rounded flex items-center gap-1 text-sm hover:bg-blue-200"><Camera size={16}/> สแกน</button>
                                            <button type="button" onClick={() => setCurrentProduct({...currentProduct, barcode: generateBarcode()})} className="bg-gray-200 px-3 rounded text-sm whitespace-nowrap hover:bg-gray-300">สุ่มเลข</button>
                                        </div>
                                    </div>
                                    <div><label className="block text-xs font-bold text-gray-700 mb-1">ชื่อสินค้า</label><input type="text" value={currentProduct.name} onChange={e=>setCurrentProduct({...currentProduct, name: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-red-50 p-2 rounded border border-red-100">
                                            <label className="block text-xs font-bold text-red-700 mb-1">ต้นทุน/ชิ้น (บาท)</label>
                                            <input type="number" value={currentProduct.cost} onChange={e=>setCurrentProduct({...currentProduct, cost: Number(e.target.value)})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required />
                                        </div>
                                        <div className="bg-green-50 p-2 rounded border border-green-100">
                                            <label className="block text-xs font-bold text-green-700 mb-1">ราคาขาย (บาท)</label>
                                            <input type="number" value={currentProduct.price} onChange={e=>setCurrentProduct({...currentProduct, price: Number(e.target.value)})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required />
                                        </div>
                                    </div>
                                    {currentProduct.price && currentProduct.cost && (<div className="text-right text-xs font-bold text-gray-500">กำไรต่อชิ้น: <span className="text-green-600 text-sm">฿{Number(currentProduct.price) - Number(currentProduct.cost)}</span></div>)}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-700 mb-1">ปรับจำนวนสต็อก</label>
                                            <input type="number" value={currentProduct.stock} onChange={e=>setCurrentProduct({...currentProduct, stock: Number(e.target.value)})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none font-bold text-blue-700" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-700 mb-1">หมวดหมู่</label>
                                            <select value={currentProduct.category} onChange={e=>setCurrentProduct({...currentProduct, category: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none"><option value="เครื่องเขียน">เครื่องเขียน</option><option value="เครื่องดื่ม">เครื่องดื่ม</option><option value="อาหารว่าง">อาหารว่าง</option><option value="อื่นๆ">อื่นๆ</option></select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 mb-1">รูปภาพสินค้า</label>
                                        <div className="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50 transition relative">
                                            <input type="file" accept="image/*" onChange={handleProductImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            {currentProduct.image && currentProduct.image !== 'https://placehold.co/100x100?text=New' ? (
                                                <div className="flex flex-col items-center"><img src={currentProduct.image} alt="Product" className="h-24 object-contain rounded border mb-2 shadow-sm"/><span className="text-xs text-blue-600 font-medium">กดเพื่อเปลี่ยนรูปภาพ</span></div>
                                            ) : (
                                                <div className="flex flex-col items-center text-gray-400 py-2"><UploadCloud size={32} className="mb-2"/><p className="text-sm font-medium">คลิกเพื่อถ่ายรูป / อัปโหลดไฟล์ภาพ</p></div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="pt-4 flex justify-end gap-2 border-t mt-4">
                                        <button type="button" onClick={() => setModalMode(null)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-medium">ยกเลิก</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded font-medium hover:bg-blue-700">บันทึกข้อมูล</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                    <BarcodeScannerModal isOpen={showCameraScanner} onClose={() => setShowCameraScanner(false)} title="แสกนบาร์โค้ดลงฟอร์ม" onScan={(code) => { setCurrentProduct({...currentProduct, barcode: code}); setShowCameraScanner(false); }}/>
                </div>
            );
        }

        function Members({ members, setMembers, settings, expenses, setExpenses, addLog, currentUser }) {
            const [editModal, setEditModal] = useState(null);
            const [paymentModal, setPaymentModal] = useState(null);
            const [payForm, setPayForm] = useState({ dividend: 0, refund: 0 });

            const handleSave = (e) => {
                e.preventDefault();
                const newMembers = (Array.isArray(members) ? members : []).map(m => String(m.id) === String(editModal.id) ? editModal : m);
                if (!(Array.isArray(members) ? members : []).find(m => String(m.id) === String(editModal.id))) newMembers.push(editModal);
                setMembers(newMembers);
                addLog('จัดการสมาชิก', `บันทึกข้อมูลสมาชิก ${editModal.name}`);
                setEditModal(null);
            };

            const handleDeleteMember = (id, name) => {
                if (window.confirm(`ต้องการลบสมาชิก ${name} ใช่หรือไม่?`)) {
                    setMembers((Array.isArray(members) ? members : []).filter(m => String(m.id) !== String(id)));
                    addLog('ลบสมาชิก', `ลบข้อมูลสมาชิก: ${name} (${id})`);
                }
            };

            const handleOpenPayment = (member) => {
                setPaymentModal(member);
                const totalDiv = Number(member.shares||0) * Number(settings.sharePrice||0) * (Number(settings.dividendRate||0) / 100);
                const paidDiv = Number(member.paidDividend||0);
                const totalRef = Number(member.totalSpent||0) * (Number(settings.refundRate||0) / 100);
                const paidRef = Number(member.paidRefund||0);
                setPayForm({
                    dividend: Math.max(0, totalDiv - paidDiv).toFixed(2),
                    refund: Math.max(0, totalRef - paidRef).toFixed(2)
                });
            };

            const handleSavePayment = (e) => {
                e.preventDefault();
                const payDiv = parseFloat(payForm.dividend) || 0;
                const payRef = parseFloat(payForm.refund) || 0;
                const totalPay = payDiv + payRef;

                if (totalPay <= 0) return alert("กรุณาระบุยอดเงินที่ต้องการจ่าย");

                const updatedMember = { ...paymentModal, paidDividend: Number(paymentModal.paidDividend||0) + payDiv, paidRefund: Number(paymentModal.paidRefund||0) + payRef };
                setMembers((Array.isArray(members) ? members : []).map(m => String(m.id) === String(paymentModal.id) ? updatedMember : m));

                const newExpense = {
                    id: 'EXP' + Date.now().toString().slice(-4), date: new Date().toLocaleString('th-TH'), type: 'payout',
                    amount: totalPay, user: currentUser ? currentUser.name : 'Admin', receiver: paymentModal.name, 
                    details: `[จ่ายปันผล] รหัส ${paymentModal.id} (ปันผล: ${payDiv}฿, เฉลี่ยคืน: ${payRef}฿)`, image: ""
                };
                setExpenses([newExpense, ...(Array.isArray(expenses) ? expenses : [])]);

                addLog('จ่ายปันผลสมาชิก', `จ่ายเงิน ฿${totalPay} ให้ ${paymentModal.name}`);
                setPaymentModal(null);
                alert("บันทึกการจ่ายเงินปันผลสำเร็จ ระบบหักเงินออกจากลิ้นชักแล้ว!");
            };

            const arrMembers = Array.isArray(members) ? members : [];

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <h3 className="text-lg font-bold text-gray-800">ระบบจัดการสมาชิก & การปันผล</h3>
                        <button onClick={()=>setEditModal({id:'NEW'+Date.now().toString().slice(-4), name:'', type:'นักเรียน', classLevel:'อนุบาล 2', shares:10, totalSpent:0, paidDividend: 0, paidRefund: 0})} className="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition flex items-center gap-2 text-sm font-medium w-full sm:w-auto justify-center"><Users size={16} /> สมาชิกใหม่</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div className="bg-orange-50 p-5 rounded-xl border border-orange-100 shadow-sm">
                            <p className="text-sm text-orange-600 font-medium">จำนวนสมาชิกทั้งหมด</p>
                            <p className="text-3xl font-black text-orange-800 mt-1">{arrMembers.length} <span className="text-base font-normal">คน</span></p>
                        </div>
                        <div className="bg-purple-50 p-5 rounded-xl border border-purple-100 shadow-sm">
                            <p className="text-sm text-purple-600 font-medium">รวมหุ้นสหกรณ์ทั้งหมด</p>
                            <p className="text-3xl font-black text-purple-800 mt-1">{arrMembers.reduce((acc, m) => acc + Number(m.shares||0), 0)} <span className="text-base font-normal">หุ้น</span></p>
                            <p className="text-xs text-purple-500 mt-1">มูลค่ารวม {(arrMembers.reduce((acc, m) => acc + Number(m.shares||0), 0) * Number(settings.sharePrice||0)).toLocaleString()} บาท</p>
                        </div>
                    </div>

                    <div className="overflow-x-auto rounded-lg border border-gray-200">
                        <table className="w-full text-left border-collapse min-w-[1300px]">
                            <thead>
                                <tr className="bg-gray-50 border-b border-gray-200 text-xs text-gray-600">
                                    <th className="p-3 font-medium">รหัส/ชื่อ</th>
                                    <th className="p-3 font-medium text-center">ชั้น/ประเภท</th>
                                    <th className="p-3 font-medium text-right">หุ้น (x{settings.sharePrice}฿)</th>
                                    <th className="p-3 font-medium text-right">ยอดซื้อสะสม</th>
                                    <th className="p-3 font-medium text-right text-purple-600 bg-purple-50">สิทธิ์ปันผลทั้งหมด</th>
                                    <th className="p-3 font-medium text-right text-blue-600 bg-blue-50">สิทธิ์เฉลี่ยคืนทั้งหมด</th>
                                    <th className="p-3 font-medium text-right text-green-700 bg-green-50">รับเงินแล้ว (฿)</th>
                                    <th className="p-3 font-medium text-right text-orange-600 bg-orange-50">ค้างจ่าย (ยกยอด)</th>
                                    <th className="p-3 font-medium text-center">จ่ายเงิน</th>
                                    <th className="p-3 font-medium text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100 text-sm">
                                {arrMembers.slice().sort((a, b) => getGradeWeight(a.classLevel) - getGradeWeight(b.classLevel)).map(m => {
                                    const totalDiv = (Number(m.shares||0) * Number(settings.sharePrice||0) * (Number(settings.dividendRate||0) / 100));
                                    const paidDiv = Number(m.paidDividend||0);
                                    const remainDiv = Math.max(0, totalDiv - paidDiv);
                                    const totalRef = (Number(m.totalSpent||0) * (Number(settings.refundRate||0) / 100));
                                    const paidRef = Number(m.paidRefund||0);
                                    const remainRef = Math.max(0, totalRef - paidRef);
                                    const totalPaid = paidDiv + paidRef;
                                    const totalRemain = remainDiv + remainRef;
                                    const isFullyPaid = totalRemain <= 0.01;

                                    return (
                                        <tr key={m.id} className={`hover:bg-gray-50 ${isFullyPaid ? 'opacity-60' : ''}`}>
                                            <td className="p-3"><p className="font-bold text-gray-800">{m.name}</p><p className="text-xs text-gray-500 font-mono">รหัส: {m.id}</p></td>
                                            <td className="p-3 text-center"><span className={`px-2 py-1 rounded-full text-xs border whitespace-nowrap ${m.type === 'นักเรียน' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-green-50 text-green-700 border-green-200'}`}>{m.classLevel}</span></td>
                                            <td className="p-3 text-right font-bold text-gray-700">{m.shares}</td>
                                            <td className="p-3 text-right text-green-600 font-bold">฿{Number(m.totalSpent||0).toLocaleString()}</td>
                                            <td className="p-3 text-right text-purple-700 bg-purple-50/30">฿{totalDiv.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                            <td className="p-3 text-right text-blue-700 bg-blue-50/30">฿{totalRef.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                            <td className="p-3 text-right font-bold text-green-700 bg-green-50/50">฿{totalPaid.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                            <td className="p-3 text-right font-black text-orange-600 bg-orange-50/50">฿{totalRemain.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                            <td className="p-3 text-center">
                                                <button onClick={() => handleOpenPayment(m)} disabled={isFullyPaid} className={`flex items-center justify-center gap-1 mx-auto px-3 py-1 rounded-lg text-xs font-bold transition shadow-sm border ${isFullyPaid ? 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed' : 'bg-blue-100 text-blue-700 border-blue-300 hover:bg-blue-200'}`}>
                                                    {isFullyPaid ? <><CheckCircle size={14}/> จบแล้ว</> : <><Money size={14}/> จ่ายเงิน</>}
                                                </button>
                                            </td>
                                            <td className="p-3 text-center">
                                                <div className="flex items-center justify-center gap-2">
                                                    <button onClick={()=>setEditModal({...m})} className="text-orange-500 hover:bg-orange-100 p-1.5 rounded transition" title="แก้ไข"><Edit size={16} /></button>
                                                    <button onClick={() => handleDeleteMember(m.id, m.name)} className="text-red-500 hover:bg-red-100 p-1.5 rounded transition" title="ลบ"><Trash2 size={16} /></button>
                                                </div>
                                            </td>
                                        </tr>
                                    )
                                })}
                            </tbody>
                        </table>
                    </div>

                    {paymentModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl animate-in zoom-in-95">
                                <div className="p-4 flex justify-between items-center text-white bg-blue-600">
                                    <h3 className="font-bold text-lg flex items-center gap-2"><Money/> จ่ายเงินปันผลสมาชิก</h3>
                                    <button onClick={() => setPaymentModal(null)} className="text-white/70 hover:text-white"><X size={20}/></button>
                                </div>
                                <div className="p-6 bg-gray-50 border-b">
                                    <h4 className="font-bold text-lg text-gray-800 text-center">{paymentModal.name}</h4>
                                    <p className="text-xs text-gray-500 text-center">รหัส: {paymentModal.id}</p>
                                </div>
                                <form onSubmit={handleSavePayment} className="p-6 space-y-5 bg-white">
                                    <div className="border border-purple-200 rounded-xl overflow-hidden">
                                        <div className="bg-purple-50 p-3 border-b border-purple-200 flex justify-between">
                                            <span className="font-bold text-purple-800 text-sm">1. สิทธิ์เงินปันผลหุ้น</span>
                                            <span className="font-bold text-purple-800 text-sm">รวม ฿{(Number(paymentModal.shares||0)*Number(settings.sharePrice||0)*(Number(settings.dividendRate||0)/100)).toFixed(2)}</span>
                                        </div>
                                        <div className="p-4 bg-white flex justify-between items-center gap-4">
                                            <div className="text-xs text-gray-500 space-y-1">
                                                <p>รับไปแล้ว: <span className="text-gray-800 font-medium">฿{Number(paymentModal.paidDividend||0).toFixed(2)}</span></p>
                                                <p>คงเหลือ (สมทบ): <span className="text-orange-600 font-bold">฿{Math.max(0, (Number(paymentModal.shares||0)*Number(settings.sharePrice||0)*(Number(settings.dividendRate||0)/100)) - Number(paymentModal.paidDividend||0)).toFixed(2)}</span></p>
                                            </div>
                                            <div className="text-right">
                                                <label className="block text-xs font-bold text-gray-700 mb-1">จ่ายรอบนี้ (฿)</label>
                                                <input type="number" step="0.01" value={payForm.dividend} onChange={e=>setPayForm({...payForm, dividend: e.target.value})} className="w-32 text-right p-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500 font-bold text-purple-700" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="border border-blue-200 rounded-xl overflow-hidden">
                                        <div className="bg-blue-50 p-3 border-b border-blue-200 flex justify-between">
                                            <span className="font-bold text-blue-800 text-sm">2. สิทธิ์เงินเฉลี่ยคืน</span>
                                            <span className="font-bold text-blue-800 text-sm">รวม ฿{(Number(paymentModal.totalSpent||0)*(Number(settings.refundRate||0)/100)).toFixed(2)}</span>
                                        </div>
                                        <div className="p-4 bg-white flex justify-between items-center gap-4">
                                            <div className="text-xs text-gray-500 space-y-1">
                                                <p>รับไปแล้ว: <span className="text-gray-800 font-medium">฿{Number(paymentModal.paidRefund||0).toFixed(2)}</span></p>
                                                <p>คงเหลือ (สมทบ): <span className="text-orange-600 font-bold">฿{Math.max(0, (Number(paymentModal.totalSpent||0)*(Number(settings.refundRate||0)/100)) - Number(paymentModal.paidRefund||0)).toFixed(2)}</span></p>
                                            </div>
                                            <div className="text-right">
                                                <label className="block text-xs font-bold text-gray-700 mb-1">จ่ายรอบนี้ (฿)</label>
                                                <input type="number" step="0.01" value={payForm.refund} onChange={e=>setPayForm({...payForm, refund: e.target.value})} className="w-32 text-right p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 font-bold text-blue-700" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-gray-100 p-4 rounded-xl flex justify-between items-center">
                                        <span className="font-bold text-gray-700">ยอดรวมที่จะหักจากลิ้นชัก (จ่ายจริง)</span>
                                        <span className="text-2xl font-black text-green-600">฿{((parseFloat(payForm.dividend)||0) + (parseFloat(payForm.refund)||0)).toLocaleString('th-TH', {minimumFractionDigits: 2})}</span>
                                    </div>
                                    <div className="pt-2 flex gap-3">
                                        <button type="button" onClick={() => setPaymentModal(null)} className="flex-1 py-3 bg-gray-200 text-gray-700 font-bold rounded-lg hover:bg-gray-300 transition">ยกเลิก</button>
                                        <button type="submit" className="flex-1 py-3 text-white font-bold rounded-lg transition shadow-md bg-blue-600 hover:bg-blue-700">ยืนยันการจ่ายเงิน</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {editModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-xl p-6 w-[400px] max-w-full shadow-2xl">
                                <h3 className="text-lg font-bold mb-4 border-b pb-2">แก้ไขข้อมูลสมาชิก</h3>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div><label className="block text-xs font-bold text-gray-700 mb-1">รหัสนักเรียน / เลขประจำตำแหน่งครู</label><input type="text" value={editModal.id} onChange={e=>setEditModal({...editModal, id: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required /></div>
                                    <div><label className="block text-xs font-bold text-gray-700 mb-1">ชื่อ-นามสกุล</label><input type="text" value={editModal.name} onChange={e=>setEditModal({...editModal, name: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-700 mb-1">ชั้นเรียน / ประเภท</label>
                                            <select value={editModal.classLevel} onChange={e => setEditModal({...editModal, classLevel: e.target.value, type: e.target.value === 'ครู' ? 'ครู' : 'นักเรียน'})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none">
                                                <option value="อนุบาล 2">อนุบาล 2</option><option value="อนุบาล 3">อนุบาล 3</option><option value="ป.1">ป.1</option><option value="ป.2">ป.2</option><option value="ป.3">ป.3</option><option value="ป.4">ป.4</option><option value="ป.5">ป.5</option><option value="ป.6">ป.6</option><option value="ครู">ครู/บุคลากร</option>
                                            </select>
                                        </div>
                                        <div><label className="block text-xs font-bold text-gray-700 mb-1">จำนวนหุ้น (หุ้นละ {settings.sharePrice}฿)</label><input type="number" value={editModal.shares} onChange={e=>setEditModal({...editModal, shares: Number(e.target.value)})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required /></div>
                                    </div>
                                    <div className="pt-4 flex justify-end gap-2 border-t mt-4">
                                        <button type="button" onClick={() => setEditModal(null)} className="px-4 py-2 text-gray-600 bg-gray-100 rounded font-medium">ยกเลิก</button>
                                        <button type="submit" className="px-4 py-2 bg-orange-500 text-white rounded font-medium hover:bg-orange-600">บันทึก</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ExpenseManagement({ expenses, setExpenses, sales, members, settings, addLog, currentUser }) {
            const [modalMode, setModalMode] = useState(null); 
            const [form, setForm] = useState({ amount: '', receiver: '', details: '', image: null });
            const [viewImage, setViewImage] = useState(null);
            const [clearAdvanceExp, setClearAdvanceExp] = useState(null);
            const [clearForm, setClearForm] = useState({ spent: '', image: null });

            const arrMembers = Array.isArray(members) ? members : [];
            const arrSales = Array.isArray(sales) ? sales : [];
            const arrExpenses = Array.isArray(expenses) ? expenses : [];

            const totalShareCapital = arrMembers.reduce((sum, m) => sum + Number(m.shares||0), 0) * Number(settings.sharePrice||0); 
            const totalSalesCash = arrSales.reduce((sum, s) => sum + Number(s.total||0), 0); 
            const totalExpensesCash = arrExpenses.reduce((sum, e) => sum + Number(e.amount||0), 0); 
            const currentDrawerCash = totalShareCapital + totalSalesCash - totalExpensesCash; 

            const handleImageUpload = (e, targetForm, setTargetForm) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 800; let width = img.width; let height = img.height;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                            setTargetForm({ ...targetForm, image: canvas.toDataURL('image/jpeg', 0.6) });
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSaveExpense = (e) => {
                e.preventDefault();
                if (!form.amount || !form.receiver || !form.details) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                const amt = parseFloat(form.amount);
                if (amt <= 0) return alert("จำนวนเงินไม่ถูกต้อง");
                if (amt > currentDrawerCash && !window.confirm(`ยอดเงินที่เบิก (฿${amt}) มากกว่าเงินในระบบที่มี (฿${currentDrawerCash}) \nต้องการดำเนินการต่อหรือไม่?`)) return;
                if (!form.image && !window.confirm(`คุณยังไม่ได้แนบหลักฐาน \nยืนยันจะบันทึกหรือไม่?`)) return;

                const newExpense = {
                    id: 'EXP' + Date.now().toString().slice(-4), date: new Date().toLocaleString('th-TH'), type: modalMode,
                    amount: amt, user: currentUser.name, receiver: form.receiver, details: form.details, image: form.image || ""
                };
                setExpenses([newExpense, ...arrExpenses], newExpense);
                
                const logType = modalMode === 'purchase' ? 'จ่ายเงินซื้อสินค้า' : modalMode === 'special' ? 'เบิกจ่ายพิเศษ' : 'ให้ยืมเงินรองจ่าย';
                addLog(logType, `เบิกเงิน ฿${amt} ให้ ${form.receiver} (${form.details})`);
                setModalMode(null); setForm({ amount: '', receiver: '', details: '', image: null }); alert("บันทึกการเบิกจ่ายเงินสำเร็จ");
            };

            const handleSaveClearAdvance = (e) => {
                e.preventDefault();
                const spent = parseFloat(clearForm.spent);
                if (isNaN(spent) || spent < 0) return alert("กรุณากรอกยอดที่ซื้อของจริงให้ถูกต้อง");
                
                const originalAmt = clearAdvanceExp.amount;
                const changeToReturn = originalAmt - spent; 
                const expenseAdjustmentAmount = spent - originalAmt; 

                const newExpense = {
                    id: 'EXP' + Date.now().toString().slice(-4), date: new Date().toLocaleString('th-TH'), type: 'advance_clear',
                    amount: expenseAdjustmentAmount, user: currentUser.name, receiver: clearAdvanceExp.receiver,
                    details: `[เคลียร์ยอด ${clearAdvanceExp.id}] ซื้อของจริง ฿${spent.toLocaleString()} (ยืมไป ฿${originalAmt.toLocaleString()})`,
                    image: clearForm.image || ""
                };
                setExpenses([newExpense, ...arrExpenses], newExpense);
                
                let logMsg = `เคลียร์ยอด ${clearAdvanceExp.id} (ซื้อจริง ${spent}฿, `;
                if (changeToReturn > 0) logMsg += `คืนเงินทอน ${changeToReturn}฿ เข้าลิ้นชัก)`;
                else if (changeToReturn < 0) logMsg += `เบิกเพิ่ม ${-changeToReturn}฿ จากลิ้นชัก)`;
                else logMsg += `พอดีกับยอดที่ยืม)`;
                
                addLog('เคลียร์เงินยืม', logMsg); setClearAdvanceExp(null); setClearForm({ spent: '', image: null }); alert("บันทึกการเคลียร์ยอดสำเร็จ!");
            };

            const checkIsCleared = (expId) => arrExpenses.some(e => e.type === 'advance_clear' && String(e.details).includes(expId));

            return (
                <div className="space-y-6">
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center"><Wallet size={32}/></div>
                            <div>
                                <p className="text-sm font-bold text-gray-500">เงินสดคงเหลือ (ทุนหุ้น + ยอดขาย - เบิกจ่าย + คืนทอน)</p>
                                <p className={`text-4xl font-black ${currentDrawerCash < 0 ? 'text-red-600' : 'text-blue-700'}`}>฿{currentDrawerCash.toLocaleString('th-TH', {minimumFractionDigits:2})}</p>
                                {currentDrawerCash < 0 && <p className="text-xs text-red-500 mt-1">* เงินสดติดลบ (มีการนำเงินส่วนตัวมาเติม)</p>}
                            </div>
                        </div>
                        <div className="flex flex-wrap gap-3 w-full md:w-auto">
                            <button onClick={() => setModalMode('purchase')} className="flex-1 md:flex-none bg-green-600 text-white px-5 py-3 rounded-lg font-bold hover:bg-green-700 transition flex items-center justify-center gap-2 shadow-sm"><ShoppingCart size={18}/> ซื้อของเข้าร้าน</button>
                            <button onClick={() => setModalMode('advance')} className="flex-1 md:flex-none bg-orange-500 text-white px-5 py-3 rounded-lg font-bold hover:bg-orange-600 transition flex items-center justify-center gap-2 shadow-sm"><Receipt size={18}/> ให้ยืมเงินรองจ่าย</button>
                            <button onClick={() => setModalMode('special')} className="flex-1 md:flex-none bg-purple-600 text-white px-5 py-3 rounded-lg font-bold hover:bg-purple-700 transition flex items-center justify-center gap-2 shadow-sm"><Gift size={18}/> เบิกจ่ายพิเศษ</button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                        <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">ประวัติการเบิกจ่าย และการเคลียร์ยอด</h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left min-w-[1000px]">
                                <thead>
                                    <tr className="bg-gray-50 text-gray-600 text-sm border-b">
                                        <th className="p-3">รหัส/วันที่</th><th className="p-3">ประเภท</th><th className="p-3">ผู้บันทึก (Admin)</th>
                                        <th className="p-3">ผู้รับเงิน/ร้านค้า</th><th className="p-3">รายละเอียด</th><th className="p-3 text-right">ยอดเบิก/คืน (฿)</th>
                                        <th className="p-3 text-center">หลักฐาน</th><th className="p-3 text-center">สถานะ/เคลียร์ยอด</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100 text-sm">
                                    {arrExpenses.length === 0 ? <tr><td colSpan="8" className="text-center py-8 text-gray-400">ยังไม่มีประวัติการเบิกเงิน</td></tr> : 
                                    arrExpenses.map(exp => {
                                        const isAdvance = exp.type === 'advance'; const isCleared = isAdvance ? checkIsCleared(exp.id) : false;
                                        return (
                                            <tr key={exp.id} className={`hover:bg-gray-50 ${exp.type === 'advance_clear' ? 'bg-green-50/30' : ''}`}>
                                                <td className="p-3"><p className="font-bold text-gray-800">{exp.id}</p><p className="text-xs text-gray-500">{exp.date}</p></td>
                                                <td className="p-3">
                                                    <span className={`px-2 py-1 rounded-full text-xs border whitespace-nowrap 
                                                        ${exp.type === 'purchase' ? 'bg-green-50 text-green-700 border-green-200' : 
                                                        exp.type === 'advance' ? 'bg-orange-50 text-orange-700 border-orange-200' :
                                                        exp.type === 'special' ? 'bg-purple-50 text-purple-700 border-purple-200' :
                                                        exp.type === 'payout' ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-blue-50 text-blue-700 border-blue-200'}`}>
                                                        {exp.type === 'purchase' ? 'ซื้อสินค้าเข้า' : exp.type === 'advance' ? 'ยืมเงินรองจ่าย' : exp.type === 'special' ? 'เบิกจ่ายพิเศษ' : exp.type === 'payout' ? 'จ่ายปันผล' : 'เคลียร์เงินยืม'}
                                                    </span>
                                                </td>
                                                <td className="p-3 text-gray-700">{exp.user}</td><td className="p-3 font-bold text-blue-700">{exp.receiver}</td>
                                                <td className="p-3 text-gray-600 max-w-[200px] truncate" title={exp.details}>{exp.details}</td>
                                                <td className={`p-3 text-right font-black ${Number(exp.amount) > 0 ? 'text-red-600' : 'text-green-600'}`}>
                                                    {Number(exp.amount) > 0 ? `- ฿${Number(exp.amount).toLocaleString()}` : `+ ฿${Math.abs(Number(exp.amount)).toLocaleString()}`}
                                                </td>
                                                <td className="p-3 text-center">
                                                    {exp.image ? <button onClick={() => setViewImage(exp.image)} className="text-blue-500 hover:text-blue-700 font-medium text-xs flex items-center justify-center gap-1 mx-auto bg-blue-50 px-2 py-1 rounded"><FileImage size={14}/> ดูรูป</button> : <span className="text-gray-400 text-xs">-</span>}
                                                </td>
                                                <td className="p-3 text-center">

        function PrintReportModal({ sales, products, members, settings, expenses, onClose, dateRangeText }) {
            const [reporterName, setReporterName] = useState("");
            const [managerName, setManagerName] = useState("");
            const [coopTeacherName, setCoopTeacherName] = useState("");
            const [directorName, setDirectorName] = useState("");
            const [reportDate, setReportDate] = useState(new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }));

            const arrSales = Array.isArray(sales) ? sales : [];
            const arrExpenses = Array.isArray(expenses) ? expenses : [];
            const arrMembers = Array.isArray(members) ? members : [];

            const productSalesCount = {};
            let totalSales = 0; let totalCost = 0;
            arrSales.forEach(sale => {
                totalSales += Number(sale.total||0);
                if(Array.isArray(sale.items)){ sale.items.forEach(item => { productSalesCount[item.id] = (productSalesCount[item.id] || 0) + Number(item.qty||0); totalCost += (Number(item.cost||0) * Number(item.qty||0)); }); }
            });
            const grossProfit = totalSales - totalCost;

            let totalPayoutLiability = 0; let totalPaidOut = 0; let totalShareCapital = 0;
            arrMembers.forEach(m => {
                const shareValue = Number(m.shares||0) * Number(settings.sharePrice||0);
                totalShareCapital += shareValue;
                const dividend = shareValue * (Number(settings.dividendRate||0) / 100);
                const refund = Number(m.totalSpent||0) * (Number(settings.refundRate||0) / 100);
                totalPayoutLiability += (dividend + refund);
                totalPaidOut += (Number(m.paidDividend||0) + Number(m.paidRefund||0));
            });

            const payoutExpensesInPeriod = arrExpenses.filter(e => e.type === 'payout').reduce((sum, e) => sum + Number(e.amount||0), 0);
            const netProfit = grossProfit - payoutExpensesInPeriod;
            const totalExpensesCash = arrExpenses.reduce((sum, e) => sum + Number(e.amount||0), 0);
            const availableCashFlow = totalShareCapital + totalSales - totalExpensesCash;
            const topProducts = Object.entries(productSalesCount).map(([id, qty]) => ({ ...(Array.isArray(products)?products:[]).find(p => String(p.id) === String(id)), soldQty: qty })).sort((a, b) => b.soldQty - a.soldQty).slice(0, 10);
