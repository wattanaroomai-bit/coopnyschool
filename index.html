        function Reports({ sales, products, members, settings, expenses, currentUser }) {
            const [showPrintModal, setShowPrintModal] = useState(false);
            const [reportPeriod, setReportPeriod] = useState('all'); 
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            useEffect(() => {
                const today = new Date();
                const formatDate = (d) => {
                    const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0');
                    return `${y}-${m}-${day}`;
                };
                if (reportPeriod === 'today') { setStartDate(formatDate(today)); setEndDate(formatDate(today)); } 
                else if (reportPeriod === 'week') {
                    const firstDay = new Date(today.setDate(today.getDate() - today.getDay()));
                    const lastDay = new Date(today.setDate(today.getDate() - today.getDay() + 6));
                    setStartDate(formatDate(firstDay)); setEndDate(formatDate(lastDay));
                } else if (reportPeriod === 'month') {
                    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
                    const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                    setStartDate(formatDate(firstDay)); setEndDate(formatDate(lastDay));
                } else if (reportPeriod === 'all') { setStartDate(''); setEndDate(''); }
            }, [reportPeriod]);

            const filteredData = useMemo(() => {
                let filteredSales = Array.isArray(sales) ? sales : [];
                let filteredExpenses = Array.isArray(expenses) ? expenses : [];
                if (reportPeriod !== 'all' && startDate && endDate) {
                    const start = new Date(startDate); start.setHours(0,0,0,0);
                    const end = new Date(endDate); end.setHours(23,59,59,999);
                    const filterFn = (item) => { const itemDate = parseThaiDate(item.date); return itemDate >= start && itemDate <= end; };
                    filteredSales = filteredSales.filter(filterFn);
                    filteredExpenses = filteredExpenses.filter(filterFn);
                }
                return { filteredSales, filteredExpenses };
            }, [sales, expenses, reportPeriod, startDate, endDate]);

            const fsales = filteredData.filteredSales;
            const fexpenses = filteredData.filteredExpenses;

            const productSalesCount = {};
            let totalSales = 0; let totalCost = 0;
            fsales.forEach(sale => {
                totalSales += Number(sale.total||0);
                if(Array.isArray(sale.items)){
                    sale.items.forEach(item => {
                        productSalesCount[item.id] = (productSalesCount[item.id] || 0) + Number(item.qty||0);
                        totalCost += (Number(item.cost||0) * Number(item.qty||0));
                    });
                }
            });

            const grossProfit = totalSales - totalCost;
            const payoutExpensesInPeriod = fexpenses.filter(e => e.type === 'payout').reduce((sum, e) => sum + Number(e.amount||0), 0);
            const netProfit = grossProfit - payoutExpensesInPeriod;
            const totalExpensesCash = fexpenses.reduce((sum, e) => sum + Number(e.amount||0), 0);

            let totalPayoutLiability = 0; let totalPaidOut = 0; let totalShareCapital = 0;
            const arrMembers = Array.isArray(members) ? members : [];
            arrMembers.forEach(m => {
                const shareValue = Number(m.shares||0) * Number(settings.sharePrice||0);
                totalShareCapital += shareValue;
                totalPayoutLiability += (shareValue * (Number(settings.dividendRate||0) / 100)) + (Number(m.totalSpent||0) * (Number(settings.refundRate||0) / 100));
                totalPaidOut += (Number(m.paidDividend||0) + Number(m.paidRefund||0));
            });

            const topProducts = Object.entries(productSalesCount).map(([id, qty]) => ({ ...(Array.isArray(products)?products:[]).find(p => String(p.id) === String(id)), soldQty: qty })).sort((a, b) => b.soldQty - a.soldQty).slice(0, 5);
            const dateRangeText = reportPeriod === 'all' ? 'ตั้งแต่เริ่มเปิดระบบทั้งหมด' : reportPeriod === 'today' ? `รายวัน (วันที่ ${new Date(startDate).toLocaleDateString('th-TH')})` : `ระหว่าง ${new Date(startDate).toLocaleDateString('th-TH')} - ${new Date(endDate).toLocaleDateString('th-TH')}`;

            return (
                <div className="space-y-6">
                <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 w-full lg:w-auto">
                        <div className="flex items-center gap-2 bg-blue-50 px-3 py-2 rounded-lg border border-blue-100">
                            <Calendar className="text-blue-600" size={20}/>
                            <select value={reportPeriod} onChange={(e) => setReportPeriod(e.target.value)} className="bg-transparent font-bold text-blue-800 outline-none cursor-pointer">
                                <option value="all">ข้อมูลทั้งหมดรวม</option>
                                <option value="today">รายวัน (วันนี้)</option>

                                <span className="text-gray-500">ถึง</span>
                                <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="border border-gray-300 rounded px-2 py-1 text-sm outline-none"/>
                            </div>
                        )}
                    </div>
                    <button onClick={() => setShowPrintModal(true)} className="bg-blue-600 text-white px-5 py-2.5 rounded-lg hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-sm font-bold w-full lg:w-auto shrink-0">
                        <Printer size={20} /> พิมพ์รายงานกระดาษ
                    </button>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2"><Wallet className="text-indigo-500" /> สรุปผลการดำเนินงาน ({dateRangeText})</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div className="bg-gray-50 border border-gray-200 rounded-xl p-5 relative overflow-hidden">
                            <p className="text-sm text-gray-600 font-bold mb-1 relative z-10">ยอดขายรวม</p>
                            <p className="text-2xl font-black text-gray-800 relative z-10">฿{totalSales.toLocaleString('th-TH')}</p>
                        </div>
                        <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 relative overflow-hidden">
                            <p className="text-sm text-blue-700 font-bold mb-1 relative z-10">กำไรเบื้องต้น (หักต้นทุนสินค้า)</p>
                            <p className="text-2xl font-black text-blue-800 relative z-10">฿{grossProfit.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                        </div>
                        <div className={`border rounded-xl p-5 relative overflow-hidden ${netProfit >= 0 ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                            <p className={`text-sm font-bold mb-1 relative z-10 ${netProfit >= 0 ? 'text-green-700' : 'text-red-700'}`}>กำไรสุทธิ (หลังหักรายจ่าย/ปันผลในรอบนี้)</p>
                            <p className={`text-3xl font-black relative z-10 ${netProfit >= 0 ? 'text-green-800' : 'text-red-800'}`}>฿{netProfit.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                        </div>
                    </div>

                    <h3 className="text-sm font-bold text-gray-600 mb-3 border-t pt-4">สถานะการจ่ายปันผล & สภาพคล่องรวม (ทุกช่วงเวลา)</h3>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-orange-50 border border-orange-200 rounded-xl p-4 text-center"><p className="text-xs text-orange-700 font-bold">ทุนเรือนหุ้นทั้งหมด</p><p className="text-lg font-black text-orange-800">฿{totalShareCapital.toLocaleString('th-TH')}</p></div>
                        <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 text-center"><p className="text-xs text-purple-700 font-bold">ภาระสิทธิ์ปันผลรวม</p><p className="text-lg font-black text-purple-800">฿{totalPayoutLiability.toLocaleString('th-TH', {minimumFractionDigits: 2})}</p></div>
                        <div className="bg-green-50 border border-green-200 rounded-xl p-4 text-center"><p className="text-xs text-green-700 font-bold">จ่ายปันผลไปแล้ว</p><p className="text-lg font-black text-green-800">฿{totalPaidOut.toLocaleString('th-TH', {minimumFractionDigits: 2})}</p></div>
                        <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-center"><p className="text-xs text-red-700 font-bold">ค้างจ่าย (สมทบ)</p><p className="text-lg font-black text-red-800">฿{Math.max(0, totalPayoutLiability - totalPaidOut).toLocaleString('th-TH', {minimumFractionDigits: 2})}</p></div>
                    </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">🏆 สินค้าขายดี ({dateRangeText})</h3>
                        <div className="space-y-4">
                            {topProducts.map((p, i) => (
                            <div key={p.id} className="flex items-center gap-4 p-2 hover:bg-gray-50 rounded-lg">
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shadow-sm shrink-0 ${i === 0 ? 'bg-yellow-400 text-white' : i === 1 ? 'bg-gray-300 text-gray-700' : i === 2 ? 'bg-orange-300 text-white' : 'bg-blue-50 text-blue-600 border'}`}>{i + 1}</div>
                                <img src={p.image || 'https://placehold.co/100x100?text=No+Image'} className="w-10 h-10 rounded border object-cover shrink-0" />
                                <div className="flex-1 min-w-0"><h4 className="font-medium text-sm text-gray-800 truncate">{p.name}</h4><p className="text-xs text-gray-500">{p.category}</p></div>
                                <div className="text-right shrink-0"><p className="font-bold text-green-600 bg-green-50 px-2 py-1 rounded-lg text-sm">{p.soldQty} ชิ้น</p></div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">

                        <div className="space-y-3 h-80 overflow-y-auto custom-scrollbar pr-2">
                            {fsales.slice().reverse().map((sale, i) => (
                            <div key={i} className="p-3 border border-gray-100 rounded-lg flex justify-between items-center hover:bg-gray-50 shadow-sm">
                                <div><p className="font-bold text-sm text-gray-800 flex items-center gap-2">{sale.id}</p><p className="text-xs text-gray-500 mt-0.5">{sale.date}</p></div>
                                <div className="text-right"><p className="font-black text-green-600">฿{Number(sale.total||0).toLocaleString()}</p><p className="text-xs text-gray-500">{Array.isArray(sale.items) ? sale.items.length : 0} รายการ</p></div>
                            </div>
                            ))}
                            {fsales.length === 0 && <p className="text-center text-gray-400 py-8">ไม่มีการขายเกิดขึ้นในช่วงเวลานี้</p>}
                        </div>
                    </div>

                {showPrintModal && (
                    <PrintReportModal 
                        sales={fsales} products={products} members={members} settings={settings} expenses={fexpenses} 
                        onClose={() => setShowPrintModal(false)} dateRangeText={dateRangeText}

        function SettingsTab({ settings, setSettings, onSave, logs, addLog }) {
            const [urlBase, setUrlBase] = useState("");
            const [pendingLogo, setPendingLogo] = useState(null); 
            useEffect(() => { setUrlBase(window.location.origin + window.location.pathname); }, []);
            const handleSaveSettings = (e) => { e.preventDefault(); onSave(settings); addLog('เปลี่ยนการตั้งค่า', `อัปเดตข้อมูลสหกรณ์และอัตราปันผล`); alert('บันทึกการตั้งค่าสำเร็จ'); };
            const handleLogoSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image(); img.onload = () => {
                            const canvas = document.createElement('canvas'); const MAX_SIZE = 200; let width = img.width; let height = img.height;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d');
                            ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, width, height);
                            setPendingLogo(canvas.toDataURL('image/jpeg', 0.8));
                        }; img.src = event.target.result;
                    }; reader.readAsDataURL(file);
                }
            };
            const handleConfirmLogo = () => { if (!pendingLogo) return; const updatedSettings = { ...settings, coopLogo: pendingLogo }; setSettings(updatedSettings); onSave(updatedSettings); setPendingLogo(null); addLog('เปลี่ยนโลโก้', 'อัปโหลดโลโก้ใหม่สำเร็จ'); alert('อัปโหลดและบันทึกโลโก้สำเร็จ!'); };
            const copyMemberLink = () => alert("คัดลอกลิงก์ให้สมาชิกเรียบร้อยแล้ว: \n\n" + (urlBase || ""));

            return (
                <div className="space-y-6">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-4xl">
                    <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><Settings className="text-gray-500"/> ข้อมูลและตั้งค่าสหกรณ์</h3>
                    <form onSubmit={handleSaveSettings} className="space-y-6">
                    <div className="flex flex-col md:flex-row gap-6 items-start">
                        <div className="flex flex-col items-center gap-3 shrink-0">
                            <div className="w-32 h-32 border-2 border-dashed border-gray-300 rounded-xl flex items-center justify-center relative overflow-hidden bg-gray-50">
                                {(pendingLogo || settings.coopLogo) ? <img src={pendingLogo || settings.coopLogo} className="w-full h-full object-cover" /> : <div className="text-center text-gray-400"><UploadCloud size={24} className="mx-auto mb-1"/><span className="text-xs">ไม่มีรูป</span></div>}
                            </div>
                            <div className="flex flex-col gap-2 w-full min-w-[140px]">
                                <label className="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded-lg text-sm font-medium text-center cursor-pointer hover:bg-gray-100 transition shadow-sm w-full block">เลือกรูปภาพ<input type="file" accept="image/*" onChange={handleLogoSelect} className="hidden" /></label>
                                {pendingLogo && <button type="button" onClick={handleConfirmLogo} className="bg-green-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-green-700 transition shadow-sm w-full flex items-center justify-center gap-1"><CheckCircle size={16}/> ยืนยันภาพ</button>}
                            </div>
                        </div>
                        <div className="flex-1 w-full">
                            <label className="block text-sm font-bold text-gray-800 mb-1">ชื่อสหกรณ์ / ร้านค้า</label>
                            <input type="text" value={settings.coopName || ''} onChange={e=>setSettings({...settings, coopName: e.target.value})} className="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none font-bold text-gray-800" placeholder="เช่น สหกรณ์โรงเรียนบ้านนกยูง..." />
                            <p className="text-xs text-gray-500 mt-2">ข้อมูลส่วนนี้จะถูกแสดงที่เมนูแถบด้านซ้าย ในใบเสร็จ และหน้าตรวจสอบยอดสำหรับสมาชิก</p>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4 border-t border-gray-100">
                        <div className="bg-green-50 p-4 rounded-xl border border-green-100"><label className="block text-sm font-bold text-green-800 mb-2">ราคาต่อหุ้น (บาท)</label><input type="number" value={settings.sharePrice} onChange={e=>setSettings({...settings, sharePrice: Number(e.target.value)})} className="w-full border-2 border-green-200 rounded p-2 outline-none font-bold text-lg text-green-900" /></div>
                        <div className="bg-purple-50 p-4 rounded-xl border border-purple-100"><label className="block text-sm font-bold text-purple-800 mb-2">อัตราปันผลค่าหุ้น (%)</label><input type="number" step="0.1" value={settings.dividendRate} onChange={e=>setSettings({...settings, dividendRate: Number(e.target.value)})} className="w-full border-2 border-purple-200 rounded p-2 outline-none font-bold text-lg text-purple-900" /></div>
                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-100"><label className="block text-sm font-bold text-blue-800 mb-2">อัตราเงินเฉลี่ยคืน (%)</label><input type="number" step="0.1" value={settings.refundRate} onChange={e=>setSettings({...settings, refundRate: Number(e.target.value)})} className="w-full border-2 border-blue-200 rounded p-2 outline-none font-bold text-lg text-blue-900" /></div>
                    </div>
                    <button type="submit" className="bg-gray-800 text-white px-8 py-3 rounded-lg font-bold hover:bg-gray-900 transition shadow-sm w-full md:w-auto">บันทึกการตั้งค่าทั้งหมด</button>
                    </form>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-4xl">
                    <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><ExternalLink className="text-blue-500"/> ลิงก์ระบบตรวจสอบยอดสำหรับสมาชิก</h3>
                    <div className="flex gap-2"><input type="text" readOnly value={urlBase || "กำลังโหลด..."} className="flex-1 bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm text-gray-500 font-mono outline-none" /><button onClick={copyMemberLink} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition flex-shrink-0">คัดลอกลิงก์เว็บ</button></div>
                </div>
                </div>
            );
        }

        function UserManagement({ users, setUsers, addLog }) {
            const [modalMode, setModalMode] = useState(null); 
            const [editingUser, setEditingUser] = useState({ id: '', username: '', password: '', name: '', role: 'teacher' });

            const handleSaveUser = (e) => {
                e.preventDefault();
                if (!editingUser.username || !editingUser.password || !editingUser.name) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');
                const arrUsers = Array.isArray(users) ? users : [];
                if (modalMode === 'add') {
                    if (arrUsers.find(u => String(u.username) === String(editingUser.username))) return alert('ชื่อนี้มีอยู่ในระบบแล้ว!');
                    const newId = 'U' + String(Date.now()).slice(-4);
                    setUsers([...arrUsers, { ...editingUser, id: newId }]);
                    addLog('เพิ่มผู้ใช้ใหม่', `เพิ่มบัญชี ${editingUser.username} สิทธิ์ ${editingUser.role}`);
                } else {
                    setUsers(arrUsers.map(u => String(u.id) === String(editingUser.id) ? editingUser : u));
                    addLog('แก้ไขผู้ใช้', `แก้ไขบัญชี ${editingUser.username}`);
                }
                setModalMode(null);
            };

            const handleDeleteUser = (id) => {
                if (id === 'U001') return alert('ไม่สามารถลบบัญชีหลักได้');
                if (window.confirm('ลบบัญชีผู้ใช้นี้?')) {
                    setUsers((Array.isArray(users) ? users : []).filter(u => String(u.id) !== String(id)));
                    addLog('ลบผู้ใช้', `ลบบัญชี ID: ${id}`);
                }
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-5xl mx-auto">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                    <h3 className="text-xl font-bold text-gray-800">จัดการผู้ใช้งาน</h3>
                    <button onClick={() => {setEditingUser({ id: '', username: '', password: '', name: '', role: 'teacher' }); setModalMode('add');}} className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 flex items-center gap-2"><UserPlus size={18} /> เพิ่มผู้ใช้</button>
                </div>
                <div className="border border-gray-200 rounded-xl overflow-x-auto">
                    <table className="w-full text-left min-w-[600px]">
                    <thead className="bg-gray-50 border-b"><tr><th className="p-4">รหัส</th><th className="p-4">ชื่อ</th><th className="p-4">Username</th><th className="p-4">สิทธิ์</th><th className="p-4 text-center">จัดการ</th></tr></thead>
                    <tbody className="divide-y divide-gray-100">
                        {(Array.isArray(users) ? users : []).map(u => (
                        <tr key={u.id}>
                            <td className="p-4 text-gray-500 font-mono">{u.id}</td><td className="p-4 font-bold">{u.name}</td><td className="p-4 text-gray-600">{u.username}</td>
                            <td className="p-4"><span className="px-3 py-1 rounded-full text-xs font-bold border bg-blue-50 text-blue-600">{u.role}</span></td>
                            <td className="p-4 text-center">
                            <button onClick={() => {setEditingUser(u); setModalMode('edit');}} className="p-2 text-blue-500 hover:bg-blue-100 rounded-lg"><Edit size={18} /></button>
                            <button onClick={() => handleDeleteUser(u.id)} disabled={u.id === 'U001'} className="p-2 text-red-500 hover:bg-red-100 rounded-lg"><Trash2 size={18} /></button>
                            </td>
                        </tr>
                        ))}
                    </tbody>
                    </table>
                </div>
                {modalMode && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-xl p-8 w-96 max-w-full"><h3 className="text-xl font-bold mb-4">{modalMode === 'add' ? 'เพิ่มผู้ใช้' : 'แก้ไขผู้ใช้'}</h3>
                        <form onSubmit={handleSaveUser} className="space-y-4">
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">ชื่อ-นามสกุล</label><input type="text" value={editingUser.name} onChange={e=>setEditingUser({...editingUser, name:e.target.value})} className="w-full border rounded p-2" required/></div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">Username</label><input type="text" value={editingUser.username} onChange={e=>setEditingUser({...editingUser, username:e.target.value})} className="w-full border rounded p-2" required/></div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">รหัสผ่าน</label><input type="text" value={editingUser.password} onChange={e=>setEditingUser({...editingUser, password:e.target.value})} className="w-full border rounded p-2" required/></div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">สิทธิ์การใช้งาน</label><select value={editingUser.role} onChange={e=>setEditingUser({...editingUser, role:e.target.value})} className="w-full border rounded p-2"><option value="teacher">ครูสหกรณ์</option><option value="manager">ผู้จัดการ</option><option value="admin">แอดมิน</option></select></div>
                        <div className="flex gap-2 pt-2"><button type="button" onClick={()=>setModalMode(null)} className="flex-1 py-2 bg-gray-100 rounded hover:bg-gray-200 font-medium">ยกเลิก</button><button type="submit" className="flex-1 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 font-medium">บันทึก</button></div>
                        </form>
                    </div>
                    </div>
                )}
                </div>
            );
        }

        // Render React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><CoopApp /></ErrorBoundary>);
    </script>
</body>
</html>
