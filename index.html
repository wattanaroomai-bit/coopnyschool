<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสหกรณ์โรงเรียน</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- นำเข้า React และ ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- นำเข้า Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- นำเข้า HTML5 QR Code Scanner -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==============================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbycN-KzUymkFAryompd3_FH8LAUY978FAKWbyk6ogP0ieSheSbRNjnhTg142tbJkdobqQ/exec";
        // ==============================================================

        // --- Icon Mapper ---
        const Icon = ({ name, size = 24, className = '', ...props }) => (
            <i className={`ph ph-${name} ${className}`} style={{ fontSize: size }} {...props}></i>
        );
        const Home = (p) => <Icon name="house" {...p} />;
        const ShoppingCart = (p) => <Icon name="shopping-cart" {...p} />;
        const Package = (p) => <Icon name="package" {...p} />;
        const Users = (p) => <Icon name="users" {...p} />;
        const BarChart2 = (p) => <Icon name="chart-bar" {...p} />;
        const Scan = (p) => <Icon name="scan" {...p} />;
        const Plus = (p) => <Icon name="plus" {...p} />;
        const Trash2 = (p) => <Icon name="trash" {...p} />;
        const Edit = (p) => <Icon name="pencil-simple" {...p} />;
        const Printer = (p) => <Icon name="printer" {...p} />;
        const AlertCircle = (p) => <Icon name="warning-circle" {...p} />;
        const CheckCircle = (p) => <Icon name="check-circle" {...p} />;
        const X = (p) => <Icon name="x" {...p} />;
        const Lock = (p) => <Icon name="lock" {...p} />;
        const Settings = (p) => <Icon name="gear" {...p} />;
        const LogIn = (p) => <Icon name="sign-in" {...p} />;
        const LogOut = (p) => <Icon name="sign-out" {...p} />;
        const UserPlus = (p) => <Icon name="user-plus" {...p} />;
        const Shield = (p) => <Icon name="shield-check" {...p} />;
        const Menu = (p) => <Icon name="list" {...p} />;
        const Delete = (p) => <Icon name="backspace" {...p} />;
        const History = (p) => <Icon name="clock-counter-clockwise" {...p} />;
        const Camera = (p) => <Icon name="camera" {...p} />;
        const Search = (p) => <Icon name="magnifying-glass" {...p} />;
        const UserCircle = (p) => <Icon name="user-circle" {...p} />;
        const ExternalLink = (p) => <Icon name="arrow-square-out" {...p} />;
        const ArrowLeft = (p) => <Icon name="arrow-left" {...p} />;
        const Wallet = (p) => <Icon name="wallet" {...p} />;
        const Receipt = (p) => <Icon name="receipt" {...p} />;
        const UploadCloud = (p) => <Icon name="cloud-arrow-up" {...p} />;
        const FileImage = (p) => <Icon name="image" {...p} />;
        const Loader2 = (p) => <Icon name="spinner" className={`animate-spin ${p.className||''}`} {...p} />;
        const ArrowsClockwise = (p) => <Icon name="arrows-clockwise" {...p} />;

        const getGradeWeight = (grade) => {
            const weights = { 'อนุบาล 2': 1, 'อนุบาล 3': 2, 'ป.1': 3, 'ป.2': 4, 'ป.3': 5, 'ป.4': 6, 'ป.5': 7, 'ป.6': 8, 'ครู': 99 };
            return weights[String(grade)] || 100;
        };

        // --- Error Boundary เพื่อป้องกันหน้าจอขาว ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("ระบบตรวจพบข้อผิดพลาด:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-screen flex flex-col items-center justify-center bg-gray-50 p-6 text-center">
                            <div className="bg-red-50 text-red-600 p-8 rounded-2xl border border-red-200 shadow-sm max-w-lg">
                                <AlertCircle size={64} className="mx-auto mb-4 opacity-50" />
                                <h2 className="text-2xl font-bold mb-2">อ๊ะ! เกิดข้อผิดพลาดบางอย่าง</h2>
                                <p className="mb-4 text-sm text-red-500 bg-white p-3 rounded border border-red-100 overflow-auto max-h-32">
                                    {this.state.error && this.state.error.toString()}
                                </p>
                                <p className="mb-6 text-sm text-gray-600">อาจเกิดจากข้อมูลใน Google Sheets ไม่ถูกต้อง หรือเป็นตัวเลขแต่ระบบคาดหวังข้อความ</p>
                                <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-red-700 transition shadow-md">
                                    รีเฟรชหน้าจอเพื่อเริ่มใหม่
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function CoopApp() {
        const [isInitializing, setIsInitializing] = useState(true);
        const [appMode, setAppMode] = useState('main'); 
        const [isSidebarOpen, setIsSidebarOpen] = useState(false); 

        // Global State 
        const [users, setUsers] = useState([]);
        const [products, setProducts] = useState([]);
        const [members, setMembers] = useState([]);
        const [sales, setSales] = useState([]);
        const [expenses, setExpenses] = useState([]);
        const [settings, setSettings] = useState({ dividendRate: 5, refundRate: 2, sharePrice: 10, coopName: "สหกรณ์โรงเรียนบ้านนกยูง(อสพป.30)", coopLogo: "" });
        const [logs, setLogs] = useState([]);

        // Auth State
        const [currentUser, setCurrentUser] = useState(null);
        const [showLoginModal, setShowLoginModal] = useState(false);
        const [loginForm, setLoginForm] = useState({ username: '', password: '' });
        const [loginError, setLoginError] = useState('');

        // UI State
        const [activeTab, setActiveTab] = useState('pos');
        const [posCashier, setPosCashier] = useState(null); 
        const [posLoginId, setPosLoginId] = useState('');
        const [cart, setCart] = useState([]);
        const [barcodeInput, setBarcodeInput] = useState('');
        const [checkoutModal, setCheckoutModal] = useState(false);
        const [cashGiven, setCashGiven] = useState('');
        const [receiptModal, setReceiptModal] = useState(false);
        const [lastReceipt, setLastReceipt] = useState(null);
        const [posMemberId, setPosMemberId] = useState(''); 
        const [memberModalTarget, setMemberModalTarget] = useState(null); 
        const [memberSearch, setMemberSearch] = useState('');

        useEffect(() => {
            fetchDataFromCloud();
        }, []);

        const fetchDataFromCloud = async () => {
            setIsInitializing(true);
            try {
                const response = await fetch(GAS_URL);
                const result = await response.json();
                if (result.status === "success") {
                    setUsers(result.data.users || []);
                    setProducts(result.data.products || []);
                    setMembers(result.data.members || []);
                    setSales(result.data.sales || []);
                    setExpenses(result.data.expenses || []);
                    setLogs(result.data.logs || []);
                    setSettings(result.data.settings || { dividendRate: 5, refundRate: 2, sharePrice: 10, coopName: "สหกรณ์โรงเรียน", coopLogo: "" });
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("ไม่สามารถเชื่อมต่อฐานข้อมูล Google Sheets ได้ กรุณาตรวจสอบการตั้งค่า GAS_URL");
            } finally {
                setIsInitializing(false);
            }
        };

        const syncToCloud = async (action, payload) => {
            try {
                fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action, payload })
                }).catch((e) => console.error("Sync Error Background:", e));
            } catch (e) {
                console.error("Sync Error:", e);
            }
        };

        const addLog = (action, details) => {
            const userName = currentUser ? currentUser.name : (posCashier ? posCashier.name : 'System');
            const newLog = { id: Date.now(), date: new Date().toLocaleString('th-TH'), user: String(userName), action: action, details: details };
            const updatedLogs = [newLog, ...logs];
            setLogs(updatedLogs);
            syncToCloud("ADD_LOG", newLog); 
        };

        const handleLogin = (e) => {
            e.preventDefault();
            // ป้องกันกรณีพิมพ์ข้อมูลแล้วประเภทตัวแปรไม่ตรงกัน
            const user = users.find(u => String(u.username) === String(loginForm.username) && String(u.password) === String(loginForm.password));
            if (user) {
                setCurrentUser(user);
                setShowLoginModal(false);
                setLoginForm({ username: '', password: '' });
                setLoginError('');
                setActiveTab('dashboard');
                setIsSidebarOpen(true);
                addLog('เข้าสู่ระบบจัดการ', `ล็อกอินบัญชี: ${user.username}`);
            } else {
                setLoginError('ชื่อผู้ใช้ หรือ รหัสผ่านไม่ถูกต้อง');
            }
        };

        const handleLogout = () => {
            addLog('ออกจากระบบจัดการ', 'ออกจากระบบ');
            setCurrentUser(null);
            setActiveTab('pos');
            setIsSidebarOpen(false);
        };

        const handlePosLoginSubmit = (e) => {
            e.preventDefault();
            handlePosLogin(posLoginId);
        };

        const handlePosLogin = (id) => {
            const member = members.find(m => String(m.id) === String(id));
            if (member) {
                setPosCashier(member);
                setPosLoginId('');
                addLog('เข้าสู่ระบบ POS', `เข้ากะโดย: ${member.name}`);
            } else {
                alert('ไม่พบรหัสสมาชิกนี้ในระบบ');
            }
        };

        const handlePosLogout = () => {
            addLog('ออกจากระบบ POS', `ปิดกะโดย: ${posCashier.name}`);
            setPosCashier(null);
        };

        const handleBarcodeSubmit = (e) => {
            e.preventDefault();
            if (!barcodeInput) return;
            const product = products.find(p => String(p.barcode) === String(barcodeInput));
            if (product) addToCart(product);
            else alert('ไม่พบสินค้านี้ในระบบ');
            setBarcodeInput('');
        };

        const addToCart = (product) => {
            setCart(prevCart => {
                const existing = prevCart.find(item => item.id === product.id);
                if (existing) return prevCart.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
                return [...prevCart, { ...product, qty: 1 }];
            });
        };

        const cartTotal = cart.reduce((sum, item) => sum + (Number(item.price) * Number(item.qty)), 0);

        const processCheckout = () => {
            const cash = parseFloat(cashGiven);
            if (isNaN(cash) || cash < cartTotal) return alert('รับเงินมาไม่เพียงพอ!');

            const change = cash - cartTotal;
            const sellerName = currentUser ? currentUser.name : (posCashier ? posCashier.name : 'ระบบ');
            const newSale = {
                id: 'INV' + Date.now().toString().slice(-6),
                date: new Date().toLocaleString('th-TH'),
                items: [...cart],
                total: cartTotal,
                cash: cash,
                change: change,
                seller: sellerName,
                memberId: posMemberId
            };

            const updatedProducts = products.map(p => {
                const cartItem = cart.find(c => c.id === p.id);
                return cartItem ? { ...p, stock: Number(p.stock) - Number(cartItem.qty) } : p;
            });

            let memberName = 'ลูกค้าทั่วไป';
            let updatedMembers = [...members];
            if (posMemberId) {
                const member = members.find(m => String(m.id) === String(posMemberId));
                if (member) {
                    memberName = member.name;
                    updatedMembers = members.map(m => String(m.id) === String(posMemberId) ? { ...m, totalSpent: Number(m.totalSpent || 0) + cartTotal } : m);
                    setMembers(updatedMembers);
                }
            }

            setProducts(updatedProducts);
            setSales([...sales, newSale]);
            setLastReceipt(newSale);
            setCheckoutModal(false);
            setReceiptModal(true);
            
            syncToCloud("ADD_SALE", newSale);

            addLog('ทำรายการขาย', `บิล ${newSale.id} ยอด ฿${cartTotal} (ผู้ซื้อ: ${memberName})`);
            setCart([]);
            setCashGiven('');
            setPosMemberId('');
        };

        if (isInitializing) {
            return (
            <div className="h-screen flex flex-col items-center justify-center bg-gray-50 relative">
                <Loader2 className="animate-spin text-green-600 mb-4" size={48} />
                <h2 className="text-xl font-bold text-gray-800">กำลังเชื่อมต่อฐานข้อมูล...</h2>
                <p className="text-gray-500 text-sm mt-2">โปรดรอสักครู่ ระบบกำลังโหลดข้อมูลจาก Google Sheets</p>
                <div className="absolute bottom-4 text-xs text-gray-400 font-medium">พัฒนาระบบ โดย ครูวัฒนา รู้ใหม่</div>
            </div>
            );
        }

        if (appMode === 'member_portal') {
            return <MemberPortalView members={members} settings={settings} onExit={() => setAppMode('main')} onRefresh={fetchDataFromCloud} isRefreshing={isInitializing} />;
        }

        const renderTabContent = () => {
            if (activeTab !== 'pos' && !currentUser) {
                return (
                    <div className="h-full flex flex-col items-center justify-center text-gray-500">
                        <Shield size={64} className="text-gray-300 mb-4" />
                        <h2 className="text-2xl font-bold mb-2">จำกัดสิทธิ์การเข้าถึง</h2>
                        <p className="mb-4">กรุณาลงชื่อเข้าใช้ (แอดมิน/ผู้จัดการ) เพื่อจัดการระบบหลังบ้าน</p>
                        <button onClick={() => setShowLoginModal(true)} className="bg-green-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-green-700 transition">
                            เข้าสู่ระบบจัดการ
                        </button>
                    </div>
                );
            }

            switch (activeTab) {
                case 'dashboard': return <Dashboard products={products} members={members} sales={sales} expenses={expenses} settings={settings} setActiveTab={setActiveTab}/>;
                case 'pos': 
                    if (!currentUser && !posCashier) {
                        return (
                            <div className="flex flex-col items-center justify-center h-full pb-20 relative">
                                <div className="absolute top-4 right-4">
                                    <button onClick={() => setAppMode('member_portal')} className="bg-purple-100 text-purple-700 hover:bg-purple-200 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 transition shadow-sm border border-purple-200">
                                    <Wallet size={16} /> สำหรับสมาชิก: ตรวจสอบยอด
                                    </button>
                                </div>

                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-96 max-w-full text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
                                    <div className="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-sm overflow-hidden">
                                        {settings.coopLogo ? <img src={settings.coopLogo} className="w-full h-full object-cover" alt="Logo"/> : <UserCircle size={48} />}
                                    </div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-1">{settings.coopName || "จุดขายสินค้า (POS)"}</h2>
                                    <p className="text-gray-500 text-sm mb-6">กรุณากรอก <span className="font-bold text-blue-600">รหัสสมาชิก</span> เพื่อเข้ากะทำงาน</p>
                                    
                                    <form onSubmit={handlePosLoginSubmit} className="space-y-4">
                                        <input type="text" value={posLoginId} onChange={(e) => setPosLoginId(e.target.value)} placeholder="รหัสสมาชิก นร. / ครู" className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-center text-lg font-bold tracking-wider" autoFocus />
                                        <button type="submit" disabled={!posLoginId} className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-sm disabled:bg-gray-300">เข้าสู่ระบบจุดขาย</button>
                                    </form>
                                    
                                    <div className="mt-6 pt-4 border-t border-gray-100">
                                        <button onClick={() => setMemberModalTarget('login')} className="text-blue-600 text-sm font-medium hover:underline flex items-center justify-center gap-1 mx-auto bg-blue-50 px-4 py-2 rounded-lg transition hover:bg-blue-100"><Search size={16}/> ค้นหารายชื่อสมาชิก (ลืมรหัส)</button>
                                    </div>
                                </div>
                            </div>
                        );
                    }
                    return <POS products={products} cart={cart} setCart={setCart} barcodeInput={barcodeInput} setBarcodeInput={setBarcodeInput} handleBarcodeSubmit={handleBarcodeSubmit} setCheckoutModal={setCheckoutModal} cashier={currentUser || posCashier} posMemberId={posMemberId} setPosMemberId={setPosMemberId} members={members} onOpenSearch={() => setMemberModalTarget('buyer')} settings={settings} />;
                
                case 'inventory': return <Inventory products={products} setProducts={(data) => { setProducts(data); syncToCloud("SYNC_PRODUCTS", data); }} addLog={addLog} />;
                case 'members': return <Members members={members} setMembers={(data) => { setMembers(data); syncToCloud("SYNC_MEMBERS", data); }} settings={settings} addLog={addLog} />;
                case 'expenses': return (currentUser?.role === 'admin' || currentUser?.role === 'manager') ? <ExpenseManagement expenses={expenses} setExpenses={(data, newExp) => { setExpenses(data); if(newExp) syncToCloud("ADD_EXPENSE", newExp); }} sales={sales} members={members} settings={settings} addLog={addLog} currentUser={currentUser} /> : <div>ไม่มีสิทธิ์เข้าถึง</div>;
                case 'reports': return <Reports sales={sales} products={products} members={members} settings={settings} expenses={expenses} />;
                case 'settings': return (currentUser?.role === 'admin' || currentUser?.role === 'manager') ? <SettingsTab settings={settings} setSettings={setSettings} onSave={(newSettings) => syncToCloud("UPDATE_SETTINGS", newSettings || settings)} logs={logs} addLog={addLog} /> : <div>ไม่มีสิทธิ์เข้าถึง</div>;
                case 'users-manage': return currentUser?.role === 'admin' ? <UserManagement users={users} setUsers={(data) => { setUsers(data); syncToCloud("SYNC_USERS", data); }} addLog={addLog}/> : <div>ไม่มีสิทธิ์เข้าถึง</div>;
                default: return <POS products={products} cart={cart} setCart={setCart} barcodeInput={barcodeInput} setBarcodeInput={setBarcodeInput} handleBarcodeSubmit={handleBarcodeSubmit} setCheckoutModal={setCheckoutModal} cashier={currentUser || posCashier} posMemberId={posMemberId} setPosMemberId={setPosMemberId} members={members} onOpenSearch={() => setMemberModalTarget('buyer')} settings={settings} />;
            }
        };

        return (
            <div className="flex h-screen bg-gray-50 font-sans overflow-hidden">
            {/* Sidebar */}
            <div className={`bg-green-700 text-white flex flex-col shadow-lg z-20 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                <div className={`p-4 bg-green-800 flex items-center transition-all ${isSidebarOpen ? 'gap-3' : 'justify-center'}`}>
                    <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-green-700 font-bold text-xl shrink-0 shadow-sm overflow-hidden">
                        {settings.coopLogo ? <img src={settings.coopLogo} className="w-full h-full object-cover" alt="Logo"/> : "สห."}
                    </div>
                    {isSidebarOpen && (
                        <div className="overflow-hidden whitespace-nowrap animate-in fade-in duration-300 flex-1">
                        <h1 className="font-bold text-base leading-tight truncate">{settings.coopName || "สหกรณ์โรงเรียน"}</h1>
                        <p className="text-[10px] text-green-200">{currentUser ? 'ระบบจัดการคลัง' : 'จุดขายสินค้า'}</p>
                        </div>
                    )}
                </div>
                
                <nav className="flex-1 p-3 space-y-1 overflow-y-auto custom-scrollbar overflow-x-hidden">
                    <NavItem icon={<ShoppingCart />} label="จุดขาย (POS)" active={activeTab === 'pos'} onClick={() => setActiveTab('pos')} isOpen={isSidebarOpen} />
                    {currentUser && (
                        <>
                        {isSidebarOpen ? <div className="pt-5 pb-2 px-2 overflow-hidden whitespace-nowrap"><p className="text-[10px] font-bold text-green-300 uppercase tracking-wider">ระบบจัดการ</p></div> : <div className="pt-4 pb-2 border-b border-green-600/50 mx-2 mb-2"></div>}
                        <NavItem icon={<BarChart2 />} label="แดชบอร์ด" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} isOpen={isSidebarOpen} />
                        <NavItem icon={<Package />} label="จัดการสินค้า" active={activeTab === 'inventory'} onClick={() => setActiveTab('inventory')} isOpen={isSidebarOpen} />
                        <NavItem icon={<Users />} label="ระบบสมาชิก" active={activeTab === 'members'} onClick={() => setActiveTab('members')} isOpen={isSidebarOpen} />
                        {(currentUser.role === 'admin' || currentUser.role === 'manager') && (
                            <NavItem icon={<Receipt />} label="รายจ่าย & ยืมเงิน" active={activeTab === 'expenses'} onClick={() => setActiveTab('expenses')} isOpen={isSidebarOpen} />
                        )}
                        <NavItem icon={<BarChart2 />} label="รายงานสถิติ" active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} isOpen={isSidebarOpen} />

        const [camError, setCamError] = useState('');
        useEffect(() => {
            let html5QrCode;
            if (isOpen) {
            setCamError('');
            const initScanner = async () => {
                if (!document.getElementById('reader')) return;
                html5QrCode = new window.Html5Qrcode("reader");
                try {
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: { width: 250, height: 250 } },
                        (decodedText) => { 
                            if (html5QrCode.isScanning) { 
                                html5QrCode.stop().then(() => onScan(decodedText)).catch(console.error); 
                            } else { 
                                onScan(decodedText); 
                            } 
                        },
                        (err) => {} 
                    );
                } catch (err) {
                    console.error(err);
                    setCamError("ไม่สามารถเข้าถึงกล้องได้ (โปรดตรวจสอบสิทธิ์ หรือลองใช้งานผ่าน HTTPS)");

            };

                const script = document.createElement('script'); script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js'; script.async = true; script.onload = initScanner; document.body.appendChild(script);
            } else { initScanner(); }
            }
            return () => { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(console.error); };

        const handleProductImageUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 300; 
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        setCurrentProduct({...currentProduct, image: compressedDataUrl});
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }

        };

        const handleLogoSelect = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 200; 
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        setPendingLogo(compressedDataUrl);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        const handleConfirmLogo = () => {
            if (!pendingLogo) return;
            const updatedSettings = { ...settings, coopLogo: pendingLogo };

        function ExpenseManagement({ expenses, setExpenses, sales, members, settings, addLog, currentUser }) {

        const currentDrawerCash = totalShareCapital + totalSalesCash - totalExpensesCash; 

        const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 800; // สำหรับใบเสร็จ อนุญาตให้ใหญ่ได้หน่อย (800px)
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6); // บีบอัดเยอะหน่อย
                    setForm({ ...form, image: compressedDataUrl });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);

        const handleSaveExpense = (e) => {

        function Dashboard({ products, members, sales, expenses, settings, setActiveTab }) {

        function Reports({ sales, products, members, settings, expenses }) {
        const productSalesCount = {};
        
        let totalSales = 0;
        let totalCost = 0;
        
        sales.forEach(sale => {
            totalSales += Number(sale.total||0);
            if(Array.isArray(sale.items)){
               sale.items.forEach(item => {
                 productSalesCount[item.id] = (productSalesCount[item.id] || 0) + Number(item.qty||0);
                 totalCost += (Number(item.cost||0) * Number(item.qty||0));
               });
            }
        });

        const grossProfit = totalSales - totalCost;

        let totalPayout = 0;
        let totalShareCapital = 0;
        members.forEach(m => {
            const shareValue = Number(m.shares||0) * Number(settings.sharePrice||0);
            totalShareCapital += shareValue;
            const dividend = shareValue * (Number(settings.dividendRate||0) / 100);
            const refund = Number(m.totalSpent||0) * (Number(settings.refundRate||0) / 100);
            totalPayout += (dividend + refund);
        });

        const netProfit = grossProfit - totalPayout;
        const totalExpensesCash = expenses.reduce((sum, e) => sum + Number(e.amount||0), 0);
        const availableCashFlow = totalShareCapital + totalSales - totalExpensesCash;

        const topProducts = Object.entries(productSalesCount).map(([id, qty]) => ({ ...products.find(p => String(p.id) === String(id)), soldQty: qty })).sort((a, b) => b.soldQty - a.soldQty).slice(0, 5);

        return (

                <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 relative overflow-hidden">

                    <p className="text-2xl font-black text-blue-800 relative z-10">฿{grossProfit.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                </div>
                <div className={`border rounded-xl p-5 relative overflow-hidden ${netProfit >= 0 ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                    <p className={`text-sm font-bold mb-1 relative z-10 ${netProfit >= 0 ? 'text-green-700' : 'text-red-700'}`}>กำไรสุทธิ (หลังหักปันผล/เฉลี่ยคืน)</p>
                    <p className={`text-3xl font-black relative z-10 ${netProfit >= 0 ? 'text-green-800' : 'text-red-800'}`}>฿{netProfit.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 text-center">
                    <p className="text-xs text-gray-500 font-bold">ยอดขายทั้งหมด</p>

                </div>
                <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4 text-center shadow-inner">
                    <p className="text-xs text-indigo-700 font-bold">เงินสดหมุนเวียนคงเหลือ</p>
                    <p className="text-xl font-black text-indigo-800">฿{availableCashFlow.toLocaleString('th-TH')}</p>
                </div>
                </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h3 className="text-lg font-bold text-gray-800 mb-4">🏆 สินค้าขายดี 5 อันดับแรก</h3>
                <div className="space-y-4">
                    {topProducts.map((p, i) => (
                    <div key={p.id} className="flex items-center gap-4 p-2 hover:bg-gray-50 rounded-lg">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shadow-sm shrink-0 ${i === 0 ? 'bg-yellow-400 text-white' : i === 1 ? 'bg-gray-300 text-gray-700' : i === 2 ? 'bg-orange-300 text-white' : 'bg-blue-50 text-blue-600 border'}`}>{i + 1}</div>
                        <img src={p.image || 'https://placehold.co/100x100?text=No+Image'} className="w-10 h-10 rounded border object-cover shrink-0" />
                        <div className="flex-1 min-w-0"><h4 className="font-medium text-sm text-gray-800 truncate">{p.name}</h4><p className="text-xs text-gray-500">{p.category}</p></div>
                        <div className="text-right shrink-0"><p className="font-bold text-green-600 bg-green-50 px-2 py-1 rounded-lg text-sm">{p.soldQty} ชิ้น</p></div>
                    </div>
                    ))}
                    {topProducts.length === 0 && <p className="text-center text-gray-400 py-8">ยังไม่มีข้อมูลการขายในขณะนี้</p>}
                </div>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h3 className="text-lg font-bold text-gray-800 mb-4">ประวัติการขายล่าสุด</h3>
                <div className="space-y-3">
                    {sales.slice().reverse().map((sale, i) => (
                    <div key={i} className="p-3 border border-gray-100 rounded-lg flex justify-between items-center hover:bg-gray-50 shadow-sm">
                        <div><p className="font-bold text-sm text-gray-800 flex items-center gap-2">{sale.id}</p><p className="text-xs text-gray-500 mt-0.5">{sale.date}</p></div>
                        <div className="text-right"><p className="font-black text-green-600">฿{Number(sale.total||0).toLocaleString()}</p><p className="text-xs text-gray-500">{Array.isArray(sale.items) ? sale.items.length : 0} รายการ</p></div>
                    </div>
                    ))}
                    {sales.length === 0 && <p className="text-center text-gray-400 py-8">ยังไม่มีการขายเกิดขึ้นในวันนี้</p>}
                </div>
                </div>
            </div>
            </div>
        );
        }

        function UserManagement({ users, setUsers, addLog }) {
        const [modalMode, setModalMode] = useState(null); 
        const [editingUser, setEditingUser] = useState({ id: '', username: '', password: '', name: '', role: 'teacher' });

        const handleOpenAdd = () => { setEditingUser({ id: '', username: '', password: '', name: '', role: 'teacher' }); setModalMode('add'); };
        const handleOpenEdit = (user) => { setEditingUser({ ...user }); setModalMode('edit'); };

        const handleSaveUser = (e) => {
            e.preventDefault();
            if (!editingUser.username || !editingUser.password || !editingUser.name) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');

            let newUsers;
            if (modalMode === 'add') {
            if (users.find(u => String(u.username) === String(editingUser.username))) return alert('ชื่อผู้ใช้งานนี้มีอยู่ในระบบแล้ว!');
            const newId = 'U' + String(Date.now()).slice(-4);
            newUsers = [...users, { ...editingUser, id: newId }];
            addLog('เพิ่มผู้ใช้ใหม่', `เพิ่มบัญชี ${editingUser.username} สิทธิ์ ${editingUser.role}`);
            } else {
            if (users.find(u => String(u.username) === String(editingUser.username) && String(u.id) !== String(editingUser.id))) return alert('ชื่อผู้ใช้งานนี้มีอยู่ในระบบแล้ว!');
            newUsers = users.map(u => String(u.id) === String(editingUser.id) ? editingUser : u);
            addLog('แก้ไขผู้ใช้', `แก้ไขบัญชี ${editingUser.username} (รหัสผ่าน/สิทธิ์)`);
            }
            setUsers(newUsers);
            setModalMode(null);
        };

        const handleDeleteUser = (id) => {
            if (window.confirm('ลบบัญชีผู้ใช้นี้?')) {
            if (id === 'U001') return alert('ไม่สามารถลบบัญชีหลักได้');
            const newUsers = users.filter(u => String(u.id) !== String(id));
            setUsers(newUsers);
            addLog('ลบผู้ใช้', `ลบบัญชี ID: ${id}`);
            }
        };

        return (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-5xl mx-auto">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div><h3 className="text-xl font-bold text-gray-800">จัดการผู้ใช้งาน</h3></div>
                <button onClick={handleOpenAdd} className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 flex items-center justify-center gap-2 font-medium w-full sm:w-auto"><UserPlus size={18} /> เพิ่มผู้ใช้</button>
            </div>
            <div className="border border-gray-200 rounded-xl overflow-x-auto">
                <table className="w-full text-left min-w-[600px]">
                <thead className="bg-gray-50 border-b"><tr><th className="p-4">รหัส</th><th className="p-4">ชื่อ</th><th className="p-4">Username</th><th className="p-4">สิทธิ์</th><th className="p-4 text-center">จัดการ</th></tr></thead>
                <tbody className="divide-y divide-gray-100">
                    {users.map(u => (
                    <tr key={u.id}>
                        <td className="p-4 text-gray-500 font-mono">{u.id}</td><td className="p-4 font-bold">{u.name}</td><td className="p-4 text-gray-600 bg-gray-100/50">{u.username}</td>
                        <td className="p-4"><span className={`px-3 py-1 rounded-full text-xs font-bold border ${u.role === 'admin' ? 'bg-red-50 text-red-600' : u.role === 'manager' ? 'bg-purple-50 text-purple-600' : 'bg-blue-50 text-blue-600'}`}>{u.role}</span></td>
                        <td className="p-4 text-center">
                        <div className="flex items-center justify-center gap-2">
                            <button onClick={() => handleOpenEdit(u)} className="p-2 rounded-lg text-blue-500 hover:bg-blue-100 transition" title="แก้ไข"><Edit size={18} /></button>
                            <button onClick={() => handleDeleteUser(u.id)} disabled={u.id === 'U001'} className={`p-2 rounded-lg ${u.id === 'U001' ? 'text-gray-300' : 'text-red-500 hover:bg-red-100'} transition`} title="ลบ"><Trash2 size={18} /></button>
                        </div>
                        </td>
                    </tr>
                    ))}
                </tbody>
                </table>
            </div>
            {modalMode && (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                <div className="bg-white rounded-xl p-8 w-96 max-w-full"><h3 className="text-xl font-bold mb-4">{modalMode === 'add' ? 'เพิ่มผู้ใช้' : 'แก้ไขผู้ใช้'}</h3>
                    <form onSubmit={handleSaveUser} className="space-y-4">
                    <div><label className="block text-xs font-bold text-gray-700 mb-1">ชื่อ-นามสกุล</label><input type="text" value={editingUser.name} onChange={e=>setEditingUser({...editingUser, name:e.target.value})} placeholder="ชื่อ-นามสกุล" className="w-full border rounded p-2" required/></div>
                    <div><label className="block text-xs font-bold text-gray-700 mb-1">Username</label><input type="text" value={editingUser.username} onChange={e=>setEditingUser({...editingUser, username:e.target.value})} placeholder="Username" className="w-full border rounded p-2" required/></div>
                    <div><label className="block text-xs font-bold text-gray-700 mb-1">รหัสผ่าน</label><input type="text" value={editingUser.password} onChange={e=>setEditingUser({...editingUser, password:e.target.value})} placeholder="Password" className="w-full border rounded p-2" required/></div>
                    <div><label className="block text-xs font-bold text-gray-700 mb-1">สิทธิ์การใช้งาน</label><select value={editingUser.role} onChange={e=>setEditingUser({...editingUser, role:e.target.value})} className="w-full border rounded p-2"><option value="teacher">ครูสหกรณ์</option><option value="manager">ผู้จัดการ</option><option value="admin">แอดมิน</option></select></div>
                    <div className="flex gap-2 pt-2"><button type="button" onClick={()=>setModalMode(null)} className="flex-1 py-2 bg-gray-100 rounded hover:bg-gray-200 font-medium">ยกเลิก</button><button type="submit" className="flex-1 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 font-medium">บันทึก</button></div>
                    </form>
                </div>
                </div>
            )}
            </div>
        );
        }

        // เริ่มต้นการเรนเดอร์แอพลงหน้าเว็บ (ครอบ ErrorBoundary ป้องกันจอขาว)
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><CoopApp /></ErrorBoundary>);
    </script>
</body>
</html>
