                </div>

                <div className="overflow-x-auto rounded-lg border border-gray-200">
                    <table className="w-full text-left border-collapse min-w-[900px]">
                    <thead>
                        <tr className="bg-gray-50 border-b border-gray-200 text-sm text-gray-600">
                        <th className="p-3 font-medium w-48">ภาพ & บาร์โค้ด</th>
                        <th className="p-3 font-medium">ชื่อสินค้า</th>
                        <th className="p-3 font-medium text-right">ต้นทุน</th>
                        <th className="p-3 font-medium text-right">ราคาขาย</th>
                        <th className="p-3 font-medium text-right text-green-600">กำไร/ชิ้น</th>
                        <th className="p-3 font-medium text-center">สต็อกเหลือ</th>
                        <th className="p-3 font-medium text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100 text-sm">
                        {products.map(p => (
                        <tr key={p.id} className="hover:bg-gray-50 transition">
                            <td className="p-3">
                            <div className="bg-white border rounded p-1 inline-block"><img src={`https://barcode.tec-it.com/barcode.ashx?data=${p.barcode}&code=Code128&translate-esc=true&dpi=96`} alt="barcode" className="h-10 w-auto" /></div>
                            <div className="text-xs text-gray-400 mt-1">{p.barcode}</div>
                            </td>
                            <td className="p-3 font-medium text-gray-800"><div className="flex items-center gap-2"><img src={p.image || 'https://placehold.co/100x100?text=No+Image'} className="w-8 h-8 rounded border object-cover"/> {p.name}</div></td>
                            <td className="p-3 text-right text-gray-500">฿{p.cost}</td>
                            <td className="p-3 text-right font-bold text-gray-800">฿{p.price}</td>
                            <td className="p-3 text-right font-bold text-green-600">฿{Number(p.price) - Number(p.cost)}</td>
                            <td className="p-3 text-center"><span className={`font-bold px-2 py-1 rounded ${Number(p.stock) <= Number(p.minStock || 0) ? 'bg-red-100 text-red-600' : 'text-gray-700'}`}>{p.stock}</span></td>
                            <td className="p-3 text-center">
                            <div className="flex items-center justify-center gap-2">
                                <button onClick={() => handleOpenEdit(p)} className="text-blue-500 hover:bg-blue-100 p-1.5 rounded transition"><Edit size={16} /></button>
                                <button onClick={() => handleDelete(p.id, p.name)} className="text-red-500 hover:bg-red-100 p-1.5 rounded transition"><Trash2 size={16} /></button>
                            </div>
                            </td>
                        </tr>
                        ))}
                    </tbody>
                    </table>
                </div>

                {modalMode && (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl p-6 w-[500px] max-w-[90%] max-h-[90vh] overflow-y-auto">
                        <h3 className="text-lg font-bold mb-4 border-b pb-2">{modalMode === 'add' ? 'เพิ่มสินค้าใหม่' : 'แก้ไขข้อมูลสินค้า'}</h3>
                        <form onSubmit={handleSaveProduct} className="space-y-4">
                        <div>
                            <label className="block text-xs font-bold text-gray-700 mb-1">รหัสบาร์โค้ด</label>
                            <div className="flex gap-2">
                            <input type="text" value={currentProduct.barcode} onChange={e=>setCurrentProduct({...currentProduct, barcode: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none bg-gray-50" required />
                            <button type="button" onClick={()=>setShowCameraScanner(true)} className="bg-blue-100 text-blue-700 px-3 rounded flex items-center gap-1 text-sm hover:bg-blue-200"><Camera size={16}/> สแกน</button>
                            <button type="button" onClick={() => setCurrentProduct({...currentProduct, barcode: generateBarcode()})} className="bg-gray-200 px-3 rounded text-sm whitespace-nowrap hover:bg-gray-300">สุ่มเลข</button>
                            </div>
                        </div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">ชื่อสินค้า</label><input type="text" value={currentProduct.name} onChange={e=>setCurrentProduct({...currentProduct, name: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required /></div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-red-50 p-2 rounded border border-red-100">
                            <label className="block text-xs font-bold text-red-700 mb-1">ต้นทุน/ชิ้น (บาท)</label>
                            <input type="number" value={currentProduct.cost} onChange={e=>setCurrentProduct({...currentProduct, cost: Number(e.target.value)})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required />
                            </div>
                            <div className="bg-green-50 p-2 rounded border border-green-100">
                            <label className="block text-xs font-bold text-green-700 mb-1">ราคาขาย (บาท)</label>
                            <input type="number" value={currentProduct.price} onChange={e=>setCurrentProduct({...currentProduct, price: Number(e.target.value)})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required />
                            </div>
                        </div>
                        {currentProduct.price && currentProduct.cost && (<div className="text-right text-xs font-bold text-gray-500">กำไรต่อชิ้น: <span className="text-green-600 text-sm">฿{Number(currentProduct.price) - Number(currentProduct.cost)}</span></div>)}
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                            <label className="block text-xs font-bold text-gray-700 mb-1">ปรับจำนวนสต็อก</label>
                            <input type="number" value={currentProduct.stock} onChange={e=>setCurrentProduct({...currentProduct, stock: Number(e.target.value)})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none font-bold text-blue-700" required />
                            </div>
                            <div>
                            <label className="block text-xs font-bold text-gray-700 mb-1">หมวดหมู่</label>
                            <select value={currentProduct.category} onChange={e=>setCurrentProduct({...currentProduct, category: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none"><option value="เครื่องเขียน">เครื่องเขียน</option><option value="เครื่องดื่ม">เครื่องดื่ม</option><option value="อาหารว่าง">อาหารว่าง</option><option value="อื่นๆ">อื่นๆ</option></select>
                            </div>
                        </div>
                        
                        <div>
                            <label className="block text-xs font-bold text-gray-700 mb-1">รูปภาพสินค้า</label>
                            <div className="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50 transition relative">
                                <input type="file" accept="image/*" onChange={handleProductImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                {currentProduct.image && currentProduct.image !== 'https://placehold.co/100x100?text=New' ? (
                                    <div className="flex flex-col items-center">
                                        <img src={currentProduct.image} alt="Product" className="h-24 object-contain rounded border mb-2 shadow-sm"/>
                                        <span className="text-xs text-blue-600 font-medium">กดเพื่อเปลี่ยนรูปภาพ</span>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center text-gray-400 py-2">
                                        <UploadCloud size={32} className="mb-2"/>
                                        <p className="text-sm font-medium">คลิกเพื่อถ่ายรูป / อัปโหลดไฟล์ภาพ</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="pt-4 flex justify-end gap-2 border-t mt-4">
                            <button type="button" onClick={() => setModalMode(null)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-medium">ยกเลิก</button>
                            <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded font-medium hover:bg-blue-700">บันทึกข้อมูล</button>
                        </div>
                        </form>
                    </div>
                    </div>
                )}
                <BarcodeScannerModal isOpen={showCameraScanner} onClose={() => setShowCameraScanner(false)} title="แสกนบาร์โค้ดลงฟอร์ม" onScan={(code) => { setCurrentProduct({...currentProduct, barcode: code}); setShowCameraScanner(false); }}/>
                </div>
            );
        }

        function Members({ members, setMembers, settings, addLog }) {
            const [editModal, setEditModal] = useState(null);
            const [payoutModal, setPayoutModal] = useState(null); // { member: {}, form: { dividend: 0, refund: 0 } }

            const handleSave = (e) => {
                e.preventDefault();
                const newMembers = members.map(m => String(m.id) === String(editModal.id) ? editModal : m);
                if (!members.find(m => String(m.id) === String(editModal.id))) newMembers.push(editModal);
                setMembers(newMembers);
                addLog('จัดการสมาชิก', `บันทึกข้อมูลสมาชิก ${editModal.name}`);
                setEditModal(null);
            };

            const handleDeleteMember = (id, name) => {
                if (window.confirm(`ต้องการลบสมาชิก ${name} ใช่หรือไม่?`)) {
                const newMembers = members.filter(m => String(m.id) !== String(id));
                setMembers(newMembers);
                addLog('ลบสมาชิก', `ลบข้อมูลสมาชิก: ${name} (${id})`);
                }
            };

            const handleSavePayout = (e) => {
                e.preventDefault();
                const payDiv = parseFloat(payoutModal.form.dividend) || 0;
                const payRef = parseFloat(payoutModal.form.refund) || 0;
                
                const newMembers = members.map(m => {
                    if (String(m.id) === String(payoutModal.member.id)) {
                        return { 
                            ...m, 
                            paidDividend: (m.paidDividend || 0) + payDiv,
                            paidRefund: (m.paidRefund || 0) + payRef
                        };
                    }
                    return m;
                });
                
                setMembers(newMembers);
                addLog('จ่ายเงินสมาชิก', `จ่ายปันผล ฿${payDiv}, เฉลี่ยคืน ฿${payRef} ให้กับ ${payoutModal.member.name}`);
                alert('บันทึกการจ่ายเงินสำเร็จ ยอดคงเหลือจะเก็บสมทบในปีถัดไป');
                setPayoutModal(null);
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                    <h3 className="text-lg font-bold text-gray-800">ระบบจัดการสมาชิก & การปันผล</h3>
                    <button onClick={()=>setEditModal({id:'NEW'+Date.now().toString().slice(-4), name:'', type:'นักเรียน', classLevel:'อนุบาล 2', shares:10, totalSpent:0, paidDividend:0, paidRefund:0})} className="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition flex items-center gap-2 text-sm font-medium w-full sm:w-auto justify-center"><Users size={16} /> สมาชิกใหม่</button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div className="bg-orange-50 p-5 rounded-xl border border-orange-100 shadow-sm">
                    <p className="text-sm text-orange-600 font-medium">จำนวนสมาชิกทั้งหมด</p>
                    <p className="text-3xl font-black text-orange-800 mt-1">{members.length} <span className="text-base font-normal">คน</span></p>
                    </div>
                    <div className="bg-purple-50 p-5 rounded-xl border border-purple-100 shadow-sm">
                    <p className="text-sm text-purple-600 font-medium">รวมหุ้นสหกรณ์ทั้งหมด</p>
                    <p className="text-3xl font-black text-purple-800 mt-1">{members.reduce((acc, m) => acc + Number(m.shares||0), 0)} <span className="text-base font-normal">หุ้น</span></p>
                    <p className="text-xs text-purple-500 mt-1">มูลค่ารวม {(members.reduce((acc, m) => acc + Number(m.shares||0), 0) * Number(settings.sharePrice||0)).toLocaleString()} บาท</p>
                    </div>
                </div>

                <div className="overflow-x-auto rounded-lg border border-gray-200">
                    <table className="w-full text-left border-collapse min-w-[1400px]">
                    <thead>
                        <tr className="bg-gray-50 border-b border-gray-200 text-xs text-gray-600">
                        <th className="p-3 font-medium">รหัส นร./ครู</th>
                        <th className="p-3 font-medium">ชื่อ-นามสกุล</th>
                        <th className="p-3 font-medium">ชั้น/ประเภท</th>
                        <th className="p-3 font-medium text-right">หุ้น (x{settings.sharePrice}฿)</th>
                        <th className="p-3 font-medium text-right">ยอดซื้อสะสม</th>
                        <th className="p-3 font-medium text-right text-purple-600 bg-purple-50">สิทธิ์ปันผล ({settings.dividendRate}%)</th>
                        <th className="p-3 font-medium text-right text-blue-600 bg-blue-50">สิทธิ์เฉลี่ยคืน ({settings.refundRate}%)</th>
                        <th className="p-3 font-medium text-right text-green-700 bg-green-50">คงเหลือต้องจ่าย (฿)</th>
                        <th className="p-3 font-medium text-center">จัดการจ่ายเงิน</th>
                        <th className="p-3 font-medium text-center">แก้ไข/ลบ</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100 text-sm">
                        {members.slice().sort((a, b) => getGradeWeight(a.classLevel) - getGradeWeight(b.classLevel)).map(m => {
                        const totalDividend = (Number(m.shares||0) * Number(settings.sharePrice||0) * (Number(settings.dividendRate||0) / 100));
                        const totalRefund = (Number(m.totalSpent||0) * (Number(settings.refundRate||0) / 100));
                        
                        const remainDiv = Math.max(0, totalDividend - (m.paidDividend||0));
                        const remainRef = Math.max(0, totalRefund - (m.paidRefund||0));
                        const totalRemain = remainDiv + remainRef;
                        
                        const isFullyPaid = totalRemain <= 0 && (totalDividend > 0 || totalRefund > 0);

                        return (
                            <tr key={m.id} className={`hover:bg-gray-50 ${isFullyPaid ? 'opacity-70 bg-gray-50' : ''}`}>
                            <td className="p-3 font-mono text-gray-600 font-bold">{m.id}</td>
                            <td className="p-3 font-medium text-gray-800">{m.name}</td>
                            <td className="p-3"><span className={`px-2 py-1 rounded-full text-xs border whitespace-nowrap ${m.type === 'นักเรียน' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-green-50 text-green-700 border-green-200'}`}>{m.classLevel}</span></td>
                            <td className="p-3 text-right font-bold text-gray-700">{m.shares}</td>
                            <td className="p-3 text-right text-green-600 font-bold">฿{Number(m.totalSpent||0).toLocaleString()}</td>
                            <td className="p-3 text-right bg-purple-50/30">
                                <div className="font-bold text-purple-700">฿{totalDividend.toLocaleString('th-TH', {minimumFractionDigits: 2})}</div>
                                {(m.paidDividend > 0) && <div className="text-[10px] text-gray-500">จ่ายแล้ว ฿{m.paidDividend.toLocaleString()}</div>}
                            </td>
                            <td className="p-3 text-right bg-blue-50/30">
                                <div className="font-bold text-blue-700">฿{totalRefund.toLocaleString('th-TH', {minimumFractionDigits: 2})}</div>
                                {(m.paidRefund > 0) && <div className="text-[10px] text-gray-500">จ่ายแล้ว ฿{m.paidRefund.toLocaleString()}</div>}
                            </td>
                            <td className="p-3 text-right bg-green-50/50">
                                <div className={`font-black ${totalRemain > 0 ? 'text-red-600' : 'text-green-700'}`}>฿{totalRemain.toLocaleString('th-TH', {minimumFractionDigits: 2})}</div>
                            </td>
                            <td className="p-3 text-center">
                                <button 
                                    onClick={() => setPayoutModal({member: m, form: { dividend: remainDiv.toFixed(2), refund: remainRef.toFixed(2) }})} 
                                    disabled={totalRemain <= 0}
                                    className={`flex items-center justify-center gap-1 mx-auto px-3 py-1.5 rounded-lg text-xs font-bold transition shadow-sm border ${totalRemain <= 0 ? 'bg-gray-200 text-gray-500 border-gray-300' : 'bg-green-100 text-green-700 border-green-300 hover:bg-green-200 hover:scale-105'}`}>
                                    {totalRemain <= 0 ? <><CheckCircle size={14}/> จ่ายครบแล้ว</> : <><Coin size={14}/> จ่ายเงิน</>}
                                </button>
                            </td>
                            <td className="p-3 text-center">
                                <div className="flex items-center justify-center gap-2">
                                <button onClick={()=>setEditModal({...m})} className="text-orange-500 hover:bg-orange-100 p-1.5 rounded transition" title="แก้ไข"><Edit size={16} /></button>
                                <button onClick={() => handleDeleteMember(m.id, m.name)} className="text-red-500 hover:bg-red-100 p-1.5 rounded transition" title="ลบ"><Trash2 size={16} /></button>
                                </div>
                            </td>
                            </tr>
                        )
                        })}
                    </tbody>
                    </table>
                </div>

                {/* Edit Member Modal */}
                {editModal && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-xl p-6 w-[400px] max-w-full shadow-2xl">
                        <h3 className="text-lg font-bold mb-4 border-b pb-2">แก้ไขข้อมูลสมาชิก</h3>
                        <form onSubmit={handleSave} className="space-y-4">
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">รหัสนักเรียน / เลขประจำตำแหน่งครู</label><input type="text" value={editModal.id} onChange={e=>setEditModal({...editModal, id: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required /></div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">ชื่อ-นามสกุล</label><input type="text" value={editModal.name} onChange={e=>setEditModal({...editModal, name: e.target.value})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required /></div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                            <label className="block text-xs font-bold text-gray-700 mb-1">ชั้นเรียน / ประเภท</label>
                            <select value={editModal.classLevel} onChange={e => setEditModal({...editModal, classLevel: e.target.value, type: e.target.value === 'ครู' ? 'ครู' : 'นักเรียน'})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none">
                                <option value="อนุบาล 2">อนุบาล 2</option><option value="อนุบาล 3">อนุบาล 3</option><option value="ป.1">ป.1</option><option value="ป.2">ป.2</option><option value="ป.3">ป.3</option><option value="ป.4">ป.4</option><option value="ป.5">ป.5</option><option value="ป.6">ป.6</option><option value="ครู">ครู/บุคลากร</option>
                            </select>
                            </div>
                            <div><label className="block text-xs font-bold text-gray-700 mb-1">จำนวนหุ้น (หุ้นละ {settings.sharePrice}฿)</label><input type="number" value={editModal.shares} onChange={e=>setEditModal({...editModal, shares: Number(e.target.value)})} className="w-full border rounded p-2 text-sm focus:ring-2 outline-none" required /></div>
                        </div>
                        <div className="pt-4 flex justify-end gap-2 border-t mt-4">
                            <button type="button" onClick={() => setEditModal(null)} className="px-4 py-2 text-gray-600 bg-gray-100 rounded font-medium">ยกเลิก</button>
                            <button type="submit" className="px-4 py-2 bg-orange-500 text-white rounded font-medium hover:bg-orange-600">บันทึก</button>
                        </div>
                        </form>
                    </div>
                    </div>
                )}

                {/* Payout Modal */}
                {payoutModal && (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[150] p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl p-6 w-[400px] max-w-full shadow-2xl animate-in zoom-in-95">
                            <div className="flex justify-between items-center mb-4 border-b pb-3">
                                <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2"><Coin className="text-green-600"/> จ่ายเงินสมาชิก</h3>
                                <button onClick={() => setPayoutModal(null)} className="text-gray-400 hover:text-red-500"><X size={20}/></button>
                            </div>
                            
                            <div className="bg-gray-50 p-3 rounded-lg mb-4">
                                <p className="text-sm font-bold text-gray-800">{payoutModal.member.name}</p>
                                <p className="text-xs text-gray-500">รหัส: {payoutModal.member.id}</p>
                            </div>

                            <form onSubmit={handleSavePayout} className="space-y-4">
                                <div className="bg-purple-50 p-3 rounded-xl border border-purple-100">
                                    <label className="block text-sm font-bold text-purple-800 mb-1">ยอดจ่ายเงินปันผลหุ้น (฿)</label>
                                    <p className="text-[10px] text-purple-600 mb-2">จ่ายได้สูงสุด: ฿{payoutModal.form.dividend}</p>
                                    <input type="number" step="0.01" max={payoutModal.form.dividend} value={payoutModal.form.dividend} onChange={e=>setPayoutModal({...payoutModal, form: {...payoutModal.form, dividend: e.target.value}})} className="w-full p-2 border border-purple-300 rounded focus:ring-2 focus:ring-purple-500 outline-none font-bold text-purple-900" required />
                                </div>
                                <div className="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                    <label className="block text-sm font-bold text-blue-800 mb-1">ยอดจ่ายเงินเฉลี่ยคืน (฿)</label>
                                    <p className="text-[10px] text-blue-600 mb-2">จ่ายได้สูงสุด: ฿{payoutModal.form.refund}</p>
                                    <input type="number" step="0.01" max={payoutModal.form.refund} value={payoutModal.form.refund} onChange={e=>setPayoutModal({...payoutModal, form: {...payoutModal.form, refund: e.target.value}})} className="w-full p-2 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500 outline-none font-bold text-blue-900" required />
                                </div>
                                
                                <div className="text-xs text-gray-500 text-center bg-gray-50 p-2 rounded">
                                    * ยอดที่ยังไม่จ่ายในรอบนี้ จะถูกเก็บเป็นยอดยกยอดไปในปีถัดไป
                                </div>

                                <button type="submit" className="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition shadow-md flex justify-center items-center gap-2">
                                    ยืนยันการจ่ายเงิน <CheckCircle size={18}/>
                                </button>
                            </form>
                        </div>
                    </div>
                )}
            </div>
            );
        }

        function ExpenseManagement({ expenses, setExpenses, sales, members, settings, addLog, currentUser }) {
            const [modalMode, setModalMode] = useState(null); 
            const [form, setForm] = useState({ amount: '', receiver: '', details: '', image: null });
            const [viewImage, setViewImage] = useState(null);
            
            const [clearAdvanceExp, setClearAdvanceExp] = useState(null);
            const [clearForm, setClearForm] = useState({ spent: '', image: null });

            const totalShareCapital = members.reduce((sum, m) => sum + Number(m.shares||0), 0) * Number(settings.sharePrice||0); 
            const totalSalesCash = sales.reduce((sum, s) => sum + Number(s.total||0), 0); 
            const totalExpensesCash = expenses.reduce((sum, e) => sum + Number(e.amount||0), 0); 
            const currentDrawerCash = totalShareCapital + totalSalesCash - totalExpensesCash; 

            const handleImageUpload = (e, targetForm, setTargetForm) => {
                const file = e.target.files[0];
                if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                        setTargetForm({ ...targetForm, image: compressedDataUrl });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
                }
            };

            const handleSaveExpense = (e) => {
                e.preventDefault();
                if (!form.amount || !form.receiver || !form.details) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                
                const amt = parseFloat(form.amount);
                if (amt <= 0) return alert("จำนวนเงินไม่ถูกต้อง");
                if (amt > currentDrawerCash) {
                if (!window.confirm(`ยอดเงินที่เบิก (฿${amt}) มากกว่าเงินในระบบที่มี (฿${currentDrawerCash}) \nต้องการดำเนินการต่อหรือไม่?`)) return;
                }
                if (!form.image && !window.confirm(`คุณยังไม่ได้แนบหลักฐาน \nยืนยันจะบันทึกหรือไม่?`)) return;

                const newExpense = {
                id: 'EXP' + Date.now().toString().slice(-4), date: new Date().toLocaleString('th-TH'), type: modalMode,
                amount: amt, user: currentUser.name, receiver: form.receiver, details: form.details, image: form.image || ""
                };

                const newExpenses = [newExpense, ...expenses];
                setExpenses(newExpenses, newExpense);
                addLog(modalMode === 'purchase' ? 'จ่ายเงินซื้อของเข้าร้าน' : 'ให้ยืมเงินรองจ่าย', `เบิกเงิน ฿${amt} ให้ ${form.receiver} (${form.details})`);
                setModalMode(null);
                setForm({ amount: '', receiver: '', details: '', image: null });
                alert("บันทึกการเบิกจ่ายเงินสำเร็จ");
            };

            const handleSaveClearAdvance = (e) => {
                e.preventDefault();
                const spent = parseFloat(clearForm.spent);
                if (isNaN(spent) || spent < 0) return alert("กรุณากรอกยอดที่ซื้อของจริงให้ถูกต้อง");
                if (!clearForm.image) return alert("กรุณาแนบรูปใบเสร็จการซื้อของจริงเพื่อเคลียร์ยอด");
                
                const originalAmt = clearAdvanceExp.amount;
                const changeToReturn = originalAmt - spent; 
                const expenseAdjustmentAmount = spent - originalAmt; 

                const newExpense = {
                    id: 'EXP' + Date.now().toString().slice(-4),
                    date: new Date().toLocaleString('th-TH'),
                    type: 'advance_clear',
                    amount: expenseAdjustmentAmount, 
                    user: currentUser.name,
                    receiver: clearAdvanceExp.receiver,
                    details: `[เคลียร์ยอด ${clearAdvanceExp.id}] ซื้อของจริง ฿${spent.toLocaleString()} (ยืมไป ฿${originalAmt.toLocaleString()})`,
                    image: clearForm.image || ""
                };

                const newExpenses = [newExpense, ...expenses];
                setExpenses(newExpenses, newExpense);
                
                let logMsg = `เคลียร์ยอด ${clearAdvanceExp.id} เป็นการซื้อของเข้าร้าน (ซื้อจริง ${spent}฿, `;
                if (changeToReturn > 0) logMsg += `ทอนเก็บลิ้นชัก ${changeToReturn}฿)`;
                else if (changeToReturn < 0) logMsg += `เบิกเพิ่ม ${-changeToReturn}฿ จากลิ้นชัก)`;
                else logMsg += `พอดีกับยอดที่ยืม)`;
                
                addLog('เคลียร์เงินยืม (ซื้อของเข้าร้าน)', logMsg);
                setClearAdvanceExp(null);
                setClearForm({ spent: '', image: null });
                alert("บันทึกการเคลียร์ยอดสำเร็จ ยอดการซื้อของได้ถูกบันทึก และเงินในลิ้นชักได้รับการปรับปรุงแล้ว!");
            };

            const checkIsCleared = (expId) => {
                return expenses.some(e => e.type === 'advance_clear' && String(e.details).includes(expId));
            };

            return (
                <div className="space-y-6">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div className="flex items-center gap-4">
                    <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center"><Wallet size={32}/></div>
                    <div>
                        <p className="text-sm font-bold text-gray-500">เงินสดคงเหลือลิ้นชัก (ทุนหุ้น + ยอดขาย - เบิกจ่าย)</p>
                        <p className={`text-4xl font-black ${currentDrawerCash < 0 ? 'text-red-600' : 'text-blue-700'}`}>฿{currentDrawerCash.toLocaleString('th-TH', {minimumFractionDigits:2})}</p>
                        {currentDrawerCash < 0 && <p className="text-xs text-red-500 mt-1">* เงินสดติดลบ (มีการนำเงินส่วนตัวมาเติม)</p>}
                    </div>
                    </div>
                    <div className="flex gap-3 w-full md:w-auto">
                        <button onClick={() => setModalMode('purchase')} className="flex-1 md:flex-none bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 transition flex items-center justify-center gap-2 shadow-sm"><ShoppingCart size={18}/> เบิกเงินซื้อของเข้าร้าน</button>
                        <button onClick={() => setModalMode('advance')} className="flex-1 md:flex-none bg-orange-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-orange-600 transition flex items-center justify-center gap-2 shadow-sm"><Receipt size={18}/> ให้ยืมเงินรองจ่าย</button>
                    </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">ประวัติการเบิกจ่าย และการเคลียร์ยอด</h3>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left min-w-[1000px]">
                        <thead>
                            <tr className="bg-gray-50 text-gray-600 text-sm border-b">
                            <th className="p-3">รหัส/วันที่</th>
                            <th className="p-3">ประเภท</th>
                            <th className="p-3">ผู้บันทึก (Admin)</th>
                            <th className="p-3">ผู้รับเงิน/ร้านค้า</th>
                            <th className="p-3">รายละเอียด</th>
                            <th className="p-3 text-right">ยอดเบิก/ทอน (฿)</th>
                            <th className="p-3 text-center">หลักฐาน</th>
                            <th className="p-3 text-center">สถานะ/เคลียร์ยอด</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100 text-sm">
                            {expenses.length === 0 ? <tr><td colSpan="8" className="text-center py-8 text-gray-400">ยังไม่มีประวัติการเบิกเงิน</td></tr> : 
                            expenses.map(exp => {
                                const isAdvance = exp.type === 'advance';
                                const isCleared = isAdvance ? checkIsCleared(exp.id) : false;
                                
                                return (
                                <tr key={exp.id} className={`hover:bg-gray-50 ${exp.type === 'advance_clear' ? 'bg-green-50/30' : ''}`}>
                                    <td className="p-3"><p className="font-bold text-gray-800">{exp.id}</p><p className="text-xs text-gray-500">{exp.date}</p></td>
                                    <td className="p-3">
                                        <span className={`px-2 py-1 rounded-full text-xs border whitespace-nowrap 
                                            ${exp.type === 'purchase' ? 'bg-green-50 text-green-700 border-green-200' : 
                                            exp.type === 'advance' ? 'bg-orange-50 text-orange-700 border-orange-200' :
                                            'bg-blue-50 text-blue-700 border-blue-200'}`}>
                                            {exp.type === 'purchase' ? 'ซื้อสินค้าเข้า' : exp.type === 'advance' ? 'ยืมเงินรองจ่าย' : 'เคลียร์เงินยืม'}
                                        </span>
                                    </td>
                                    <td className="p-3 text-gray-700">{exp.user}</td>
                                    <td className="p-3 font-bold text-blue-700">{exp.receiver}</td>
                                    <td className="p-3 text-gray-600 max-w-[200px] truncate" title={exp.details}>{exp.details}</td>
                                    <td className={`p-3 text-right font-black ${exp.amount > 0 ? 'text-red-600' : 'text-green-600'}`}>
                                        {exp.amount > 0 ? `- ฿${exp.amount.toLocaleString()}` : `+ ฿${Math.abs(exp.amount).toLocaleString()}`}
                                    </td>
                                    <td className="p-3 text-center">
                                    {exp.image ? (
                                        <button onClick={() => setViewImage(exp.image)} className="text-blue-500 hover:text-blue-700 font-medium text-xs flex items-center justify-center gap-1 mx-auto bg-blue-50 px-2 py-1 rounded"><FileImage size={14}/> ดูรูป</button>
                                    ) : <span className="text-gray-400 text-xs">-</span>}
                                    </td>
                                    <td className="p-3 text-center">
                                        {isAdvance ? (
                                            isCleared ? (
                                                <span className="text-green-600 font-bold text-xs flex items-center justify-center gap-1"><CheckCircle size={14}/> เคลียร์แล้ว</span>
                                            ) : (
                                                <button onClick={() => {setClearAdvanceExp(exp); setClearForm({spent: '', image: null})}} className="bg-orange-100 text-orange-700 hover:bg-orange-200 px-3 py-1 rounded-lg text-xs font-bold transition shadow-sm border border-orange-300">แจ้งยอดซื้อจริง (เคลียร์)</button>
                                            )
                                        ) : <span className="text-gray-300 text-xs">-</span>}
                                    </td>
                                </tr>
                                )
                            })
                            }
                        </tbody>
                        </table>
                    </div>
                </div>

                {modalMode && (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl animate-in zoom-in-95">
                        <div className={`p-4 flex justify-between items-center text-white ${modalMode === 'purchase' ? 'bg-green-600' : 'bg-orange-500'}`}>
                            <h3 className="font-bold text-lg flex items-center gap-2">{modalMode === 'purchase' ? <><ShoppingCart/> เบิกเงินสดเพื่อไปซื้อของเข้าร้าน</> : <><Receipt/> บันทึกให้ยืมเงินรองจ่าย</>}</h3>
                            <button onClick={() => {setModalMode(null); setForm({amount:'', receiver:'', details:'', image:null})}} className="text-white/70 hover:text-white"><X size={20}/></button>
                        </div>
                        <div className="p-6 bg-gray-50 border-b flex justify-between items-center">
                            <span className="text-gray-600 font-medium">เงินสดในลิ้นชักปัจจุบัน:</span>
                            <span className="text-2xl font-black text-blue-700">฿{currentDrawerCash.toLocaleString('th-TH', {minimumFractionDigits:2})}</span>
                        </div>
                        <form onSubmit={handleSaveExpense} className="p-6 space-y-4 bg-white">
                            <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">ยอดเบิกเงินสด (บาท) <span className="text-red-500">*</span></label>
                            <input type="number" value={form.amount} onChange={e=>setForm({...form, amount: e.target.value})} className="w-full text-2xl font-bold text-red-600 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00" required autoFocus />
                            </div>
                            <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">{modalMode === 'purchase' ? 'ชื่อร้านค้า/สถานที่ที่จะไปซื้อ' : 'ชื่อผู้ยืมเงิน'} <span className="text-red-500">*</span></label>
                            <input type="text" value={form.receiver} onChange={e=>setForm({...form, receiver: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder={modalMode === 'purchase' ? 'เช่น แม็คโคร, ร้านสมปอง' : 'เช่น ครูวิชัย'} required />
                            </div>
                            <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">รายละเอียด/รายการ <span className="text-red-500">*</span></label>
                            <textarea value={form.details} onChange={e=>setForm({...form, details: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none h-20 resize-none" placeholder="ระบุสิ่งที่ซื้อ หรือเหตุผลที่ยืมเงิน..." required />
                            </div>
                            <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">แนบรูปภาพใบเสร็จ/หลักฐาน (ถ้ามี)</label>
                            <div className="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50 transition relative">
                                <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, form, setForm)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                {form.image ? (
                                <div className="flex flex-col items-center"><img src={form.image} alt="Evidence" className="h-24 object-contain rounded border mb-2 shadow-sm"/><span className="text-xs text-blue-600 font-medium">กดเพื่อเปลี่ยนรูปภาพ</span></div>
                                ) : (
                                <div className="flex flex-col items-center text-gray-400 py-2"><UploadCloud size={32} className="mb-2"/><p className="text-sm font-medium">คลิกเพื่อถ่ายรูป / อัปโหลดไฟล์ภาพ</p></div>
                                )}
                            </div>
                            </div>
                            <div className="pt-4 flex gap-3">
                            <button type="button" onClick={() => {setModalMode(null); setForm({amount:'', receiver:'', details:'', image:null})}} className="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 transition">ยกเลิก</button>
                            <button type="submit" className={`flex-1 py-3 text-white font-bold rounded-lg transition shadow-md ${modalMode === 'purchase' ? 'bg-green-600 hover:bg-green-700' : 'bg-orange-500 hover:bg-orange-600'}`}>บันทึกหักเงิน</button>
                            </div>
                        </form>
                    </div>
                    </div>
                )}

                {clearAdvanceExp && (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl animate-in zoom-in-95">
                        <div className="p-4 flex justify-between items-center text-white bg-blue-600">
                            <h3 className="font-bold text-lg flex items-center gap-2"><Receipt/> บันทึกยอดซื้อจริงเพื่อเคลียร์เงินรองจ่าย</h3>
                            <button onClick={() => {setClearAdvanceExp(null); setClearForm({spent:'', image:null})}} className="text-white/70 hover:text-white"><X size={20}/></button>
                        </div>
                        
                        <div className="p-6 bg-gray-50 border-b">
                            <div className="flex justify-between items-center mb-2">
                            <span className="text-gray-600 font-medium">ผู้เบิกเงิน:</span>
                            <span className="font-bold text-gray-800">{clearAdvanceExp.receiver}</span>
                            </div>
                            <div className="flex justify-between items-center">
                            <span className="text-gray-600 font-medium">ยอดที่เบิกไป (เงินตั้งต้น):</span>
                            <span className="text-2xl font-black text-orange-600">฿{clearAdvanceExp.amount.toLocaleString()}</span>
                            </div>
                        </div>

                        <form onSubmit={handleSaveClearAdvance} className="p-6 space-y-4 bg-white">
                            <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl">
                                <label className="block text-sm font-bold text-blue-800 mb-1">ยอดที่นำไปซื้อของจริง (ตามใบเสร็จ) <span className="text-red-500">*</span></label>
                                <input type="number" value={clearForm.spent} onChange={e=>setClearForm({...clearForm, spent: e.target.value})} className="w-full text-2xl font-bold text-blue-900 p-3 border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white" placeholder="เช่น 800" required autoFocus />
                                
                                {clearForm.spent !== '' && (
                                    <div className="mt-4 pt-4 border-t border-blue-200 flex justify-between items-center">
                                        <span className="font-bold text-gray-700">
                                            {clearAdvanceExp.amount - parseFloat(clearForm.spent) > 0 ? 'จำนวนเงินทอนที่จะคืนเข้าลิ้นชัก:' : 
                                             clearAdvanceExp.amount - parseFloat(clearForm.spent) < 0 ? 'จำนวนเงินที่ลิ้นชักต้องจ่ายชดเชยเพิ่ม:' : 
                                             'พอดีกับยอดที่เบิกไป'}
                                        </span>
                                        <span className={`text-2xl font-black ${clearAdvanceExp.amount - parseFloat(clearForm.spent) > 0 ? 'text-green-600' : clearAdvanceExp.amount - parseFloat(clearForm.spent) < 0 ? 'text-red-600' : 'text-gray-600'}`}>
                                            {clearAdvanceExp.amount - parseFloat(clearForm.spent) === 0 ? '฿0' : `฿${Math.abs(clearAdvanceExp.amount - parseFloat(clearForm.spent)).toLocaleString()}`}
                                        </span>
                                    </div>
                                )}
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">แนบรูปภาพใบเสร็จสินค้าที่ซื้อมาเข้าร้าน <span className="text-red-500">*</span></label>
                                <div className="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50 transition relative">
                                    <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, clearForm, setClearForm)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required />
                                    {clearForm.image ? (
                                    <div className="flex flex-col items-center"><img src={clearForm.image} alt="Evidence" className="h-24 object-contain rounded border mb-2 shadow-sm"/><span className="text-xs text-blue-600 font-medium">กดเพื่อเปลี่ยนรูปภาพ</span></div>
                                    ) : (
                                    <div className="flex flex-col items-center text-gray-400 py-2"><UploadCloud size={32} className="mb-2"/><p className="text-sm font-medium">คลิกเพื่อถ่ายรูปใบเสร็จ</p></div>
                                    )}
                                </div>
                            </div>

                            <div className="pt-4 flex gap-3">
                                <button type="button" onClick={() => {setClearAdvanceExp(null); setClearForm({spent:'', image:null})}} className="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 transition">ยกเลิก</button>
                                <button type="submit" className={`flex-1 py-3 text-white font-bold rounded-lg transition shadow-md bg-blue-600 hover:bg-blue-700`}>ยืนยันเคลียร์ยอดเป็นรายจ่าย</button>
                            </div>
                        </form>
                    </div>
                    </div>
                )}

                {viewImage && (
                    <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[200] p-4 print-hidden" onClick={() => setViewImage(null)}>
                    <div className="relative max-w-4xl w-full">
                        <button onClick={() => setViewImage(null)} className="absolute -top-10 right-0 text-white hover:text-red-400 flex items-center gap-1"><X/> ปิดรูปภาพ</button>
                        <img src={viewImage} alt="หลักฐาน" className="w-full h-auto max-h-[85vh] object-contain rounded-lg shadow-2xl" onClick={e => e.stopPropagation()} />
                    </div>
                    </div>
                )}
            </div>
            )
        }

        function SettingsTab({ settings, setSettings, onSave, logs, addLog }) {
            const [urlBase, setUrlBase] = useState("");
            const [pendingLogo, setPendingLogo] = useState(null); 
            
            useEffect(() => {
                setUrlBase(window.location.origin + window.location.pathname);
            }, []);

            const handleSaveSettings = (e) => {
                e.preventDefault();
                onSave(settings); 
                addLog('เปลี่ยนการตั้งค่า', `อัปเดตข้อมูลสหกรณ์และอัตราปันผล`);
                alert('บันทึกการตั้งค่าสำเร็จ');
            };

            const handleLogoSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 200; 
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#FFFFFF';

                const today = new Date().toLocaleDateString('th-TH');
                const todaySales = sales.filter(s => s.date.includes(today)).reduce((sum, sale) => sum + Number(sale.total||0), 0);
                
                const totalShareCapital = members.reduce((sum, m) => sum + Number(m.shares||0), 0) * Number(settings.sharePrice||0);

        function Reports({ sales, products, members, settings, expenses }) {
            const [showPrintModal, setShowPrintModal] = useState(false);
            
            // Filter States
            const [filterType, setFilterType] = useState('all'); // all, daily, weekly, monthly, semester, yearly
            const [filterDateStr, setFilterDateStr] = useState(new Date().toISOString().split('T')[0]); // YYYY-MM-DD format for input

            // ฟังก์ชันกรองข้อมูล
            const getFilteredData = () => {
                let filteredSales = sales;
                let filteredExpenses = expenses;
                let reportTypeLabel = "ทั้งหมดตั้งแต่เริ่มใช้งาน";
                let dateRangeLabel = "ข้อมูลทั้งหมด";

                const targetDate = new Date(filterDateStr);
                const tYear = targetDate.getFullYear();
                const tMonth = targetDate.getMonth();
                const tDate = targetDate.getDate();

                if (filterType !== 'all') {
                    filteredSales = sales.filter(s => {
                        const d = parseThaiDate(s.date);
                        if (filterType === 'daily') return d.getFullYear() === tYear && d.getMonth() === tMonth && d.getDate() === tDate;
                        if (filterType === 'monthly') return d.getFullYear() === tYear && d.getMonth() === tMonth;
                        if (filterType === 'yearly') return d.getFullYear() === tYear; // แบบปีปฏิทิน
                        // กรณี weekly, semester อาจต้องเขียน logic เพิ่มเติมที่ซับซ้อนขึ้น ในที่นี้ใช้ monthly คลุมไปก่อนสำหรับการสาธิต
                        if (filterType === 'weekly') {
                            const diff = Math.abs(d.getTime() - targetDate.getTime());
                            const daysDiff = Math.ceil(diff / (1000 * 3600 * 24)); 
                            return daysDiff <= 7 && d.getTime() <= targetDate.getTime();
                        }
                        if (filterType === 'semester') {
                             // สมมติเทอม 1 คือ พ.ค. - ต.ค., เทอม 2 คือ พ.ย. - เม.ย.
                             const isTerm1 = tMonth >= 4 && tMonth <= 9;
                             const sIsTerm1 = d.getMonth() >= 4 && d.getMonth() <= 9;
                             return d.getFullYear() === tYear && isTerm1 === sIsTerm1;
                        }
                        return true;
                    });
                    
                    filteredExpenses = expenses.filter(e => {
                        const d = parseThaiDate(e.date);
                        if (filterType === 'daily') return d.getFullYear() === tYear && d.getMonth() === tMonth && d.getDate() === tDate;
                        if (filterType === 'monthly') return d.getFullYear() === tYear && d.getMonth() === tMonth;
                        if (filterType === 'yearly') return d.getFullYear() === tYear;
                        if (filterType === 'weekly') {
                            const diff = Math.abs(d.getTime() - targetDate.getTime());
                            const daysDiff = Math.ceil(diff / (1000 * 3600 * 24)); 
                            return daysDiff <= 7 && d.getTime() <= targetDate.getTime();
                        }
                        if (filterType === 'semester') {
                             const isTerm1 = tMonth >= 4 && tMonth <= 9;
                             const sIsTerm1 = d.getMonth() >= 4 && d.getMonth() <= 9;
                             return d.getFullYear() === tYear && isTerm1 === sIsTerm1;
                        }
                        return true;
                    });

                    // Set Labels
                    const thMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
                    if (filterType === 'daily') { reportTypeLabel = "รายวัน"; dateRangeLabel = `${tDate} ${thMonths[tMonth]} ${tYear+543}`; }
                    if (filterType === 'weekly') { reportTypeLabel = "รายสัปดาห์ (ย้อนหลัง 7 วัน)"; dateRangeLabel = `ถึงวันที่ ${tDate} ${thMonths[tMonth]} ${tYear+543}`; }
                    if (filterType === 'monthly') { reportTypeLabel = "รายเดือน"; dateRangeLabel = `เดือน ${thMonths[tMonth]} ${tYear+543}`; }
                    if (filterType === 'semester') { reportTypeLabel = "รายภาคเรียน"; dateRangeLabel = `ภาคเรียนที่ ${tMonth>=4&&tMonth<=9?'1':'2'} ปี ${tYear+543}`; }
                    if (filterType === 'yearly') { reportTypeLabel = "รายปี"; dateRangeLabel = `ประจำปี ${tYear+543}`; }
                }

                return { filteredSales, filteredExpenses, reportTypeLabel, dateRangeLabel };
            };

            const { filteredSales, filteredExpenses, reportTypeLabel, dateRangeLabel } = getFilteredData();

            // Calculate Metrics based on FILTERED data
            const productSalesCount = {};
            let totalSales = 0; let totalCost = 0;
            
            filteredSales.forEach(sale => {
                totalSales += Number(sale.total||0);
                if(Array.isArray(sale.items)){
                    sale.items.forEach(item => {
                        productSalesCount[item.id] = (productSalesCount[item.id] || 0) + Number(item.qty||0);
                        totalCost += (Number(item.cost||0) * Number(item.qty||0));
                    });
                }
            });

            const grossProfit = totalSales - totalCost;

            // Share Capital & Payout calculations remain global (not filtered by date) 
            // as they represent the current absolute state of members
            let totalPayout = 0; let totalShareCapital = 0;
            members.forEach(m => {
                const shareValue = Number(m.shares||0) * Number(settings.sharePrice||0);
                totalShareCapital += shareValue;
                const dividend = shareValue * (Number(settings.dividendRate||0) / 100);
                const refund = Number(m.totalSpent||0) * (Number(settings.refundRate||0) / 100);
                totalPayout += (dividend + refund);
            });

            const netProfit = grossProfit - totalPayout; // Note: Net profit here mixes timeframe gross with all-time payout expectations
            const totalExpensesCash = filteredExpenses.reduce((sum, e) => sum + Number(e.amount||0), 0);
            
            const topProducts = Object.entries(productSalesCount).map(([id, qty]) => ({ ...products.find(p => String(p.id) === String(id)), soldQty: qty })).sort((a, b) => b.soldQty - a.soldQty).slice(0, 5);

            return (
                <div className="space-y-6">
                    
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">รายงานและสถิติ</h3>
                    <button onClick={() => setShowPrintModal(true)} className="bg-blue-600 text-white px-5 py-2.5 rounded-lg hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-sm font-bold w-full sm:w-auto">
                        <Printer size={20} /> พิมพ์รายงาน A4
                    </button>
                </div>

                {/* Filter Bar */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-4 items-center">
                    <div className="flex items-center gap-2 text-gray-600 font-medium whitespace-nowrap">
                        <Calendar size={20}/> กรองข้อมูลรายงาน:
                    </div>
                    <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="p-2 border border-gray-300 rounded-lg outline-none focus:border-blue-500 min-w-[150px]">
                        <option value="all">ทั้งหมดตั้งแต่เปิดใช้</option>
                        <option value="daily">รายวัน (เลือกวัน)</option>
                        <option value="weekly">รายสัปดาห์</option>
                        <option value="monthly">รายเดือน</option>
                        <option value="semester">รายเทอม (ภาคเรียน)</option>
                        <option value="yearly">รายปีการศึกษา</option>
                    </select>
                    {filterType !== 'all' && (
                        <input type="date" value={filterDateStr} onChange={e=>setFilterDateStr(e.target.value)} className="p-2 border border-gray-300 rounded-lg outline-none focus:border-blue-500"/>
                    )}
                    <div className="md:ml-auto text-sm text-gray-500 font-medium bg-gray-50 px-3 py-1.5 rounded-lg border">
                        แสดงข้อมูล: {dateRangeLabel}
                    </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2"><Wallet className="text-indigo-500" /> สรุปผลประกอบการ ({reportTypeLabel})</h3>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div className="bg-gray-50 border border-gray-200 rounded-xl p-5 relative overflow-hidden">
                        <p className="text-sm text-gray-700 font-bold mb-1 relative z-10">ยอดขายรวมในช่วงเวลา</p>
                        <p className="text-2xl font-black text-gray-800 relative z-10">฿{totalSales.toLocaleString('th-TH')}</p>
                        <p className="text-xs text-gray-500 mt-1">{filteredSales.length} รายการขาย</p>
                    </div>
                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 relative overflow-hidden">
                        <p className="text-sm text-blue-700 font-bold mb-1 relative z-10">กำไรเบื้องต้น (หักทุน)</p>
                        <p className="text-2xl font-black text-blue-800 relative z-10">฿{grossProfit.toLocaleString('th-TH', {minimumFractionDigits: 2})}</p>
                    </div>
                    <div className="bg-red-50 border border-red-200 rounded-xl p-5 relative overflow-hidden">
                        <p className="text-sm text-red-700 font-bold mb-1 relative z-10">รายจ่ายในช่วงเวลา</p>
                        <p className="text-2xl font-black text-red-800 relative z-10">- ฿{totalExpensesCash.toLocaleString('th-TH')}</p>
                        <p className="text-xs text-red-500 mt-1">{filteredExpenses.length} รายการจ่าย</p>
                    </div>
                    </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 className="text-lg font-bold text-gray-800 mb-4">🏆 สินค้าขายดี 5 อันดับแรก</h3>
                    <div className="space-y-4">
                        {topProducts.map((p, i) => (
                        <div key={p.id} className="flex items-center gap-4 p-2 hover:bg-gray-50 rounded-lg">
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shadow-sm shrink-0 ${i === 0 ? 'bg-yellow-400 text-white' : i === 1 ? 'bg-gray-300 text-gray-700' : i === 2 ? 'bg-orange-300 text-white' : 'bg-blue-50 text-blue-600 border'}`}>{i + 1}</div>
                            <img src={p.image || 'https://placehold.co/100x100?text=No+Image'} className="w-10 h-10 rounded border object-cover shrink-0" />
                            <div className="flex-1 min-w-0"><h4 className="font-medium text-sm text-gray-800 truncate">{p.name}</h4><p className="text-xs text-gray-500">{p.category}</p></div>
                            <div className="text-right shrink-0"><p className="font-bold text-green-600 bg-green-50 px-2 py-1 rounded-lg text-sm">{p.soldQty} ชิ้น</p></div>
                        </div>
                        ))}
                        {topProducts.length === 0 && <p className="text-center text-gray-400 py-8">ไม่มีข้อมูลการขายในช่วงเวลานี้</p>}
                    </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 className="text-lg font-bold text-gray-800 mb-4">ประวัติการขายล่าสุด ({filteredSales.length})</h3>
                    <div className="space-y-3 max-h-[300px] overflow-y-auto custom-scrollbar pr-2">
                        {filteredSales.slice().reverse().map((sale, i) => (
                        <div key={i} className="p-3 border border-gray-100 rounded-lg flex justify-between items-center hover:bg-gray-50 shadow-sm">
                            <div><p className="font-bold text-sm text-gray-800 flex items-center gap-2">{sale.id}</p><p className="text-xs text-gray-500 mt-0.5">{sale.date}</p></div>
                            <div className="text-right"><p className="font-black text-green-600">฿{Number(sale.total||0).toLocaleString()}</p><p className="text-xs text-gray-500">{Array.isArray(sale.items) ? sale.items.length : 0} รายการ</p></div>
                        </div>
                        ))}
                        {filteredSales.length === 0 && <p className="text-center text-gray-400 py-8">ไม่มีการขายเกิดขึ้นในช่วงนี้</p>}
                    </div>
                    </div>
                </div>

                {showPrintModal && (
                    <PrintReportModal 
                        sales={filteredSales} products={products} members={members} settings={settings} expenses={filteredExpenses} 
                        onClose={() => setShowPrintModal(false)}
                        reportTypeLabel={reportTypeLabel} dateRangeLabel={dateRangeLabel}
                    />
                )}
                </div>
            );
        }

        function UserManagement({ users, setUsers, addLog }) {
            const [modalMode, setModalMode] = useState(null); 
            const [editingUser, setEditingUser] = useState({ id: '', username: '', password: '', name: '', role: 'teacher' });

            const handleOpenAdd = () => { setEditingUser({ id: '', username: '', password: '', name: '', role: 'teacher' }); setModalMode('add'); };
            const handleOpenEdit = (user) => { setEditingUser({ ...user }); setModalMode('edit'); };

            const handleSaveUser = (e) => {
                e.preventDefault();
                if (!editingUser.username || !editingUser.password || !editingUser.name) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');

                let newUsers;
                if (modalMode === 'add') {
                if (users.find(u => String(u.username) === String(editingUser.username))) return alert('ชื่อผู้ใช้งานนี้มีอยู่ในระบบแล้ว!');
                const newId = 'U' + String(Date.now()).slice(-4);
                newUsers = [...users, { ...editingUser, id: newId }];
                addLog('เพิ่มผู้ใช้ใหม่', `เพิ่มบัญชี ${editingUser.username} สิทธิ์ ${editingUser.role}`);
                } else {
                if (users.find(u => String(u.username) === String(editingUser.username) && String(u.id) !== String(editingUser.id))) return alert('ชื่อผู้ใช้งานนี้มีอยู่ในระบบแล้ว!');
                newUsers = users.map(u => String(u.id) === String(editingUser.id) ? editingUser : u);
                addLog('แก้ไขผู้ใช้', `แก้ไขบัญชี ${editingUser.username} (รหัสผ่าน/สิทธิ์)`);
                }
                setUsers(newUsers);
                setModalMode(null);
            };

            const handleDeleteUser = (id) => {
                if (window.confirm('ลบบัญชีผู้ใช้นี้?')) {
                if (id === 'U001') return alert('ไม่สามารถลบบัญชีหลักได้');
                const newUsers = users.filter(u => String(u.id) !== String(id));
                setUsers(newUsers);
                addLog('ลบผู้ใช้', `ลบบัญชี ID: ${id}`);
                }
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-5xl mx-auto">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                    <div><h3 className="text-xl font-bold text-gray-800">จัดการผู้ใช้งาน</h3></div>
                    <button onClick={handleOpenAdd} className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 flex items-center justify-center gap-2 font-medium w-full sm:w-auto"><UserPlus size={18} /> เพิ่มผู้ใช้</button>
                </div>
                <div className="border border-gray-200 rounded-xl overflow-x-auto">
                    <table className="w-full text-left min-w-[600px]">
                    <thead className="bg-gray-50 border-b"><tr><th className="p-4">รหัส</th><th className="p-4">ชื่อ</th><th className="p-4">Username</th><th className="p-4">สิทธิ์</th><th className="p-4 text-center">จัดการ</th></tr></thead>
                    <tbody className="divide-y divide-gray-100">
                        {users.map(u => (
                        <tr key={u.id}>
                            <td className="p-4 text-gray-500 font-mono">{u.id}</td><td className="p-4 font-bold">{u.name}</td><td className="p-4 text-gray-600 bg-gray-100/50">{u.username}</td>
                            <td className="p-4"><span className={`px-3 py-1 rounded-full text-xs font-bold border ${u.role === 'admin' ? 'bg-red-50 text-red-600' : u.role === 'manager' ? 'bg-purple-50 text-purple-600' : 'bg-blue-50 text-blue-600'}`}>{u.role}</span></td>
                            <td className="p-4 text-center">
                            <div className="flex items-center justify-center gap-2">
                                <button onClick={() => handleOpenEdit(u)} className="p-2 rounded-lg text-blue-500 hover:bg-blue-100 transition" title="แก้ไข"><Edit size={18} /></button>
                                <button onClick={() => handleDeleteUser(u.id)} disabled={u.id === 'U001'} className={`p-2 rounded-lg ${u.id === 'U001' ? 'text-gray-300' : 'text-red-500 hover:bg-red-100'} transition`} title="ลบ"><Trash2 size={18} /></button>
                            </div>
                            </td>
                        </tr>
                        ))}
                    </tbody>
                    </table>
                </div>
                {modalMode && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-xl p-8 w-96 max-w-full"><h3 className="text-xl font-bold mb-4">{modalMode === 'add' ? 'เพิ่มผู้ใช้' : 'แก้ไขผู้ใช้'}</h3>
                        <form onSubmit={handleSaveUser} className="space-y-4">
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">ชื่อ-นามสกุล</label><input type="text" value={editingUser.name} onChange={e=>setEditingUser({...editingUser, name:e.target.value})} placeholder="ชื่อ-นามสกุล" className="w-full border rounded p-2" required/></div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">Username</label><input type="text" value={editingUser.username} onChange={e=>setEditingUser({...editingUser, username:e.target.value})} placeholder="Username" className="w-full border rounded p-2" required/></div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">รหัสผ่าน</label><input type="text" value={editingUser.password} onChange={e=>setEditingUser({...editingUser, password:e.target.value})} placeholder="Password" className="w-full border rounded p-2" required/></div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">สิทธิ์การใช้งาน</label><select value={editingUser.role} onChange={e=>setEditingUser({...editingUser, role:e.target.value})} className="w-full border rounded p-2"><option value="teacher">ครูสหกรณ์</option><option value="manager">ผู้จัดการ</option><option value="admin">แอดมิน</option></select></div>
                        <div className="flex gap-2 pt-2"><button type="button" onClick={()=>setModalMode(null)} className="flex-1 py-2 bg-gray-100 rounded hover:bg-gray-200 font-medium">ยกเลิก</button><button type="submit" className="flex-1 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 font-medium">บันทึก</button></div>
                        </form>
                    </div>
                    </div>
                )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><CoopApp /></ErrorBoundary>);
    </script>
</body>
</html>
